<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swolts — Чат</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui;
            background: linear-gradient(135deg, #0a0a1a 0%, #151530 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            background: rgba(20, 22, 40, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        .chat-header {
            padding: 20px;
            border-bottom: 1px solid #2a2f4a;
            color: #7c83ff;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .message {
            padding: 10px 15px;
            border-radius: 18px;
            max-width: 70%;
            word-wrap: break-word;
        }
        .message.own {
            background: #7c83ff;
            color: white;
            align-self: flex-end;
        }
        .message.other {
            background: #2a2f4a;
            color: white;
            align-self: flex-start;
        }
        .message-username {
            font-size: 12px;
            opacity: 0.8;
            margin-bottom: 4px;
        }
        .input-area {
            padding: 20px;
            border-top: 1px solid #2a2f4a;
            display: flex;
            gap: 10px;
        }
        .input-area input {
            flex: 1;
            padding: 12px;
            border-radius: 24px;
            border: none;
            background: #1a1a3e;
            color: white;
        }
        .input-area input:focus { outline: none; }
        .input-area button {
            padding: 12px 24px;
            border-radius: 24px;
            border: none;
            background: #7c83ff;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .logout-btn {
            background: none;
            border: 1px solid #ff6b6b;
            color: #ff6b6b;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
        }
        .online-users { color: #4ade80; font-size: 14px; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h2>🐻 Swolts Chat</h2>
            <div>
                <span id="username"></span>
                <span class="online-users" id="onlineCount">0 онлайн</span>
                <button class="logout-btn" onclick="logout()">Выйти</button>
            </div>
        </div>
        <div class="messages" id="messages"></div>
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Введите сообщение..." maxlength="500">
            <button onclick="sendMessage()">Отправить</button>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('swolts_token');
        if (!token) window.location.href = '/';

        const payload = JSON.parse(atob(token.split('.')[1]));
        document.getElementById('username').textContent = payload.username;

        const socket = io({ auth: { token } });

        socket.on('connect', () => console.log('✅ В чате'));

        socket.on('messageHistory', (messages) => {
            const container = document.getElementById('messages');
            container.innerHTML = '';
            messages.forEach(msg => addMessage(msg, msg.userId === payload.id));
        });

        socket.on('newMessage', (msg) => addMessage(msg, msg.userId === payload.id));

        socket.on('onlineUsers', (users) => {
            document.getElementById('onlineCount').textContent = `${users.length} онлайн`;
        });

        function addMessage(msg, isOwn) {
            const div = document.createElement('div');
            div.className = `message ${isOwn ? 'own' : 'other'}`;
            div.innerHTML = `<div class="message-username">${msg.username}</div><div>${escapeHtml(msg.text)}</div>`;
            document.getElementById('messages').appendChild(div);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (text) { socket.emit('sendMessage', text); input.value = ''; }
        }

        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        function logout() {
            localStorage.removeItem('swolts_token');
            window.location.href = '/';
        }
    </script>
</body>
</html>
