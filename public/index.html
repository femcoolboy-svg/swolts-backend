<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Swolts · кислотный мессенджер</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Share Tech Mono', 'Courier New', monospace;
            background: radial-gradient(circle at 20% 30%, #0a0f1a, #03050b);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .app-wrapper {
            width: 100%;
            max-width: 1300px;
            height: 90vh;
            background: #0b0e17;
            border-radius: 28px;
            box-shadow: 0 0 20px rgba(0, 255, 100, 0.2);
            display: flex;
            overflow: hidden;
            border: 1px solid #2aff9e;
        }
        /* АУТЕНТИФИКАЦИЯ (вход/регистрация) */
        .auth-container {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0b0e17;
        }
        .auth-card {
            background: #0b0e17;
            border: 1px solid #2aff9e;
            border-radius: 32px;
            padding: 40px 32px;
            width: 380px;
            box-shadow: 0 0 30px rgba(42, 255, 158, 0.15);
        }
        .auth-card h1 {
            font-size: 2.2rem;
            background: linear-gradient(135deg, #b57cff, #2aff9e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }
        .auth-card .sub {
            color: #6c7a8e;
            margin-bottom: 28px;
            font-size: 12px;
            letter-spacing: 1px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            color: #2aff9e;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 6px;
        }
        .input-group input {
            width: 100%;
            padding: 12px 16px;
            background: #010101;
            border: 1px solid #2c3a4e;
            border-radius: 60px;
            color: #e2e8f0;
            font-size: 14px;
            font-family: monospace;
        }
        .input-group input:focus {
            outline: none;
            border-color: #b57cff;
            box-shadow: 0 0 0 2px #b57cff50;
        }
        .auth-buttons {
            display: flex;
            gap: 12px;
            margin: 20px 0 12px;
        }
        .btn-primary {
            background: linear-gradient(95deg, #2aff9e, #7c3aed);
            border: none;
            padding: 12px 20px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            flex: 1;
            text-transform: uppercase;
        }
        .btn-secondary {
            background: transparent;
            border: 1.5px solid #2aff9e;
            color: #2aff9e;
            padding: 12px 20px;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
            flex: 1;
            text-transform: uppercase;
        }
        .captcha-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 16px 0;
        }
        .captcha-btn {
            background: #1e2a3a;
            border: 1px solid #2aff9e;
            padding: 10px 20px;
            border-radius: 60px;
            color: #2aff9e;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            letter-spacing: 2px;
        }
        .captcha-btn.active {
            background: #2aff9e;
            color: black;
            box-shadow: 0 0 12px #2aff9e;
        }
        .captcha-hint {
            font-size: 11px;
            color: #ff5e7c;
        }
        .error-msg {
            color: #ff5e7c;
            background: #330000;
            padding: 8px;
            border-radius: 60px;
            text-align: center;
            font-size: 12px;
            margin-top: 12px;
        }
        .hidden { display: none !important; }
        
        /* МЕССЕНДЖЕР (сайдбар + чат) */
        .messenger-container {
            display: flex;
            width: 100%;
        }
        .sidebar {
            width: 280px;
            background: #070a12;
            border-right: 1px solid #2aff9e40;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #2aff9e30;
        }
        .sidebar-header h3 {
            color: #2aff9e;
            font-size: 1.2rem;
            letter-spacing: 2px;
        }
        .search-add {
            padding: 12px;
            border-bottom: 1px solid #2aff9e30;
        }
        .search-add input {
            width: 100%;
            padding: 8px 12px;
            background: #010101;
            border: 1px solid #2c3a4e;
            border-radius: 40px;
            color: white;
            font-size: 12px;
        }
        .search-results {
            background: #0f1422;
            margin-top: 6px;
            border-radius: 16px;
            max-height: 150px;
            overflow-y: auto;
        }
        .search-result-item {
            padding: 8px 12px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #2aff9e20;
            font-size: 13px;
        }
        .search-result-item:hover { background: #2aff9e20; }
        .friend-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }
        .friend-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            border-radius: 20px;
            cursor: pointer;
            margin-bottom: 6px;
            transition: 0.1s;
        }
        .friend-item:hover { background: #1e2a3a; }
        .friend-item.active { background: #2aff9e20; border-left: 3px solid #2aff9e; }
        .friend-status { width: 10px; height: 10px; border-radius: 10px; background: #4ade80; box-shadow: 0 0 4px #4ade80; }
        .friend-status.offline { background: #5f6c84; box-shadow: none; }
        .friend-name { flex: 1; color: #e2e8f0; font-size: 14px; }
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0b0e17;
        }
        .chat-header {
            padding: 18px 24px;
            border-bottom: 1px solid #2aff9e40;
            color: #b57cff;
            font-weight: bold;
        }
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            max-width: 70%;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 14px;
        }
        .message.own {
            background: linear-gradient(125deg, #1a2538, #0f1220);
            align-self: flex-end;
            border-right: 2px solid #b57cff;
        }
        .message.other {
            background: #10131f;
            align-self: flex-start;
            border-left: 2px solid #2aff9e;
        }
        .message-user { font-size: 11px; color: #b57cff; margin-bottom: 4px; }
        .input-area {
            padding: 20px;
            border-top: 1px solid #2aff9e40;
            display: flex;
            gap: 12px;
        }
        .input-area input {
            flex: 1;
            padding: 12px;
            border-radius: 60px;
            background: #010101;
            border: 1px solid #2c3a4e;
            color: white;
        }
        .input-area button {
            background: linear-gradient(95deg, #2aff9e, #7c3aed);
            border: none;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
        }
        .user-footer {
            padding: 12px;
            border-top: 1px solid #2aff9e30;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logout-btn {
            background: none;
            border: 1px solid #ff5e7c;
            color: #ff5e7c;
            border-radius: 40px;
            padding: 4px 12px;
            cursor: pointer;
        }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #1a1f2e; }
        ::-webkit-scrollbar-thumb { background: #2aff9e; border-radius: 10px; }
    </style>
</head>
<body>
<div class="app-wrapper" id="appWrapper">
    <!-- Панель входа/регистрации (капча "ДОБРО" для регистрации) -->
    <div id="authContainer" class="auth-container">
        <div class="auth-card">
            <h1>⚡ SWOLTS</h1>
            <div class="sub">кислотное будущее</div>
            <div id="authError" class="error-msg hidden"></div>
            
            <!-- Форма входа -->
            <div id="loginForm">
                <div class="input-group">
                    <label>ЛОГИН</label>
                    <input type="text" id="loginUsername" placeholder="никнейм" autocomplete="username">
                </div>
                <div class="input-group">
                    <label>ПАРОЛЬ</label>
                    <input type="password" id="loginPassword" placeholder="••••••" autocomplete="current-password">
                </div>
                <div class="auth-buttons">
                    <button class="btn-primary" id="doLoginBtn">ПРОДОЛЖИТЬ →</button>
                    <button class="btn-secondary" id="showRegBtn">РЕГИСТРАЦИЯ</button>
                </div>
            </div>

            <!-- Форма регистрации (скрыта) -->
            <div id="regForm" class="hidden">
                <div class="input-group">
                    <label>НОВЫЙ ЛОГИН</label>
                    <input type="text" id="regUsername" placeholder="от 3 символов">
                </div>
                <div class="input-group">
                    <label>ПАРОЛЬ</label>
                    <input type="password" id="regPassword" placeholder="минимум 4 символа">
                </div>
                <!-- Капча: кнопка "ДОБРО" -->
                <div class="captcha-row">
                    <button id="captchaBtn" class="captcha-btn">ДОБРО</button>
                    <span class="captcha-hint" id="captchaHint">нажмите, чтобы подтвердить</span>
                </div>
                <div class="auth-buttons">
                    <button class="btn-primary" id="doRegBtn">СОЗДАТЬ</button>
                    <button class="btn-secondary" id="backToLoginBtn">НАЗАД</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Мессенджер (скрыт до входа) -->
    <div id="messengerContainer" class="messenger-container hidden">
        <div class="sidebar">
            <div class="sidebar-header"><h3>👥 ДРУЗЬЯ</h3></div>
            <div class="search-add">
                <input type="text" id="searchFriendInput" placeholder="Найти по нику...">
                <div id="searchResults" class="search-results hidden"></div>
            </div>
            <div class="friend-list" id="friendsList"></div>
            <div class="user-footer">
                <span id="myUsername" style="color:#b57cff;"></span>
                <button class="logout-btn" id="logoutBtn">ВЫЙТИ</button>
            </div>
        </div>
        <div class="chat-area">
            <div class="chat-header" id="chatWithLabel">🤖 Выберите друга</div>
            <div class="messages-container" id="messagesList"><div style="color:#6c7a8e; text-align:center;">👈 Нажмите на друга чтобы начать чат</div></div>
            <div class="input-area" id="inputArea" style="display: none;">
                <input type="text" id="messageInput" placeholder="Сообщение..." maxlength="500">
                <button id="sendMsgBtn">ОТПРАВИТЬ</button>
            </div>
        </div>
    </div>
</div>

<script>
    // ---- Куки для токена ----
    function setCookie(n,v,d=7){let e=new Date(Date.now()+d*864e5).toUTCString();document.cookie=`${n}=${v}; path=/; expires=${e}; SameSite=Lax`;}
    function getCookie(n){let m=document.cookie.match(new RegExp('(^| )'+n+'=([^;]+)'));return m?m[2]:null;}
    function delCookie(n){document.cookie=`${n}=; path=/; expires=Thu, 01 Jan 1970 00:00:00 UTC;`;}
    function parseJwt(t){try{return JSON.parse(atob(t.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));}catch(e){return null;}}

    let currentUser = null;
    let currentSocket = null;
    let currentFriend = null;
    let friendsMap = new Map();
    let captchaPassed = false; // для регистрации

    // DOM элементы
    const authContainer = document.getElementById('authContainer');
    const messengerContainer = document.getElementById('messengerContainer');
    const friendsListDiv = document.getElementById('friendsList');
    const searchInput = document.getElementById('searchFriendInput');
    const searchResultsDiv = document.getElementById('searchResults');
    const messagesContainer = document.getElementById('messagesList');
    const chatWithLabel = document.getElementById('chatWithLabel');
    const inputArea = document.getElementById('inputArea');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendMsgBtn');
    const authError = document.getElementById('authError');

    function showAuthError(msg){ authError.textContent=msg; authError.classList.remove('hidden'); setTimeout(()=>authError.classList.add('hidden'),3000); }
    function escapeHtml(str){ return str.replace(/[&<>]/g, function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[m];}); }

    // ---- Капча ----
    const captchaBtn = document.getElementById('captchaBtn');
    const captchaHint = document.getElementById('captchaHint');
    captchaBtn.onclick = () => {
        captchaPassed = true;
        captchaBtn.classList.add('active');
        captchaHint.textContent = '✓ подтверждено';
        captchaHint.style.color = '#2aff9e';
    };

    // ---- API запросы ----
    async function apiRequest(url, data) {
        const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
        const json = await res.json();
        if (!res.ok) throw new Error(json.message);
        return json;
    }

    // ---- Регистрация с капчей ----
    async function handleRegister() {
        const username = document.getElementById('regUsername').value.trim();
        const password = document.getElementById('regPassword').value;
        if (username.length < 3) return showAuthError('Логин минимум 3 символа');
        if (password.length < 4) return showAuthError('Пароль минимум 4 символа');
        if (!captchaPassed) return showAuthError('Нажмите кнопку ДОБРО для подтверждения');
        try {
            const data = await apiRequest('/api/register', { username, password });
            setCookie('swolts_token', data.token, 7);
            const payload = parseJwt(data.token);
            currentUser = { id: payload.id, username: payload.username };
            startMessenger();
        } catch(e) { showAuthError(e.message); }
    }

    async function handleLogin() {
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value;
        if (!username || !password) return showAuthError('Заполните все поля');
        try {
            const data = await apiRequest('/api/login', { username, password });
            setCookie('swolts_token', data.token, 7);
            const payload = parseJwt(data.token);
            currentUser = { id: payload.id, username: payload.username };
            startMessenger();
        } catch(e) { showAuthError(e.message); }
    }

    // ---- Мессенджер: загрузка друзей, сообщений, сокеты ----
    async function loadFriends() {
        const res = await fetch(`/api/friends?userId=${currentUser.id}`);
        const friends = await res.json();
        friendsMap.clear();
        friends.forEach(f => friendsMap.set(f.id, f));
        renderFriendsList();
    }

    function renderFriendsList() {
        friendsListDiv.innerHTML = '';
        for (let f of friendsMap.values()) {
            const div = document.createElement('div');
            div.className = `friend-item ${currentFriend && currentFriend.id === f.id ? 'active' : ''}`;
            div.innerHTML = `<div class="friend-status ${f.online ? '' : 'offline'}"></div>
                             <div class="friend-name">${escapeHtml(f.username)}</div>`;
            div.onclick = () => selectFriend(f);
            friendsListDiv.appendChild(div);
        }
        if (friendsMap.size === 0) friendsListDiv.innerHTML = '<div style="color:#777; padding:12px;">Нет друзей. Добавьте через поиск.</div>';
    }

    async function selectFriend(friend) {
        currentFriend = friend;
        chatWithLabel.innerHTML = `💬 Чат с ${escapeHtml(friend.username)} ${friend.online ? '🟢' : '⚫'}`;
        inputArea.style.display = 'flex';
        const res = await fetch(`/api/messages/${friend.id}?myId=${currentUser.id}`);
        const msgs = await res.json();
        messagesContainer.innerHTML = '';
        msgs.forEach(msg => {
            const isOwn = msg.from === currentUser.id;
            addMessageToUI(msg, isOwn);
        });
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function addMessageToUI(msg, isOwn) {
        const div = document.createElement('div');
        div.className = `message ${isOwn ? 'own' : 'other'}`;
        const username = isOwn ? currentUser.username : currentFriend.username;
        div.innerHTML = `<div class="message-user">${escapeHtml(username)}</div><div>${escapeHtml(msg.text)}</div>`;
        messagesContainer.appendChild(div);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function initSocket() {
        if (currentSocket) currentSocket.disconnect();
        const token = getCookie('swolts_token');
        currentSocket = io({ auth: { token } });
        currentSocket.on('connect', () => console.log('socket ready'));
        currentSocket.on('friend_added', (newFriend) => {
            friendsMap.set(newFriend.id, newFriend);
            renderFriendsList();
        });
        currentSocket.on('friend_status', ({ userId, online }) => {
            if (friendsMap.has(userId)) {
                friendsMap.get(userId).online = online;
                renderFriendsList();
                if (currentFriend && currentFriend.id === userId) {
                    chatWithLabel.innerHTML = `💬 Чат с ${escapeHtml(currentFriend.username)} ${online ? '🟢' : '⚫'}`;
                }
            }
        });
        currentSocket.on('new_private_message', (msg) => {
            if ((msg.from === currentUser.id && msg.to === currentFriend?.id) ||
                (msg.from === currentFriend?.id && msg.to === currentUser.id)) {
                addMessageToUI(msg, msg.from === currentUser.id);
            }
            // можно также обновить превью в списке друзей (не обязательно)
        });
        currentSocket.on('friend_error', (err) => alert(err));
    }

    function sendMessage() {
        if (!currentFriend) return alert('Выберите друга');
        const text = messageInput.value.trim();
        if (!text) return;
        currentSocket.emit('private_message', { toUserId: currentFriend.id, text });
        messageInput.value = '';
    }

    // Поиск пользователей для добавления
    searchInput.addEventListener('input', async () => {
        const q = searchInput.value.trim();
        if (q.length < 2) { searchResultsDiv.classList.add('hidden'); return; }
        const res = await fetch(`/api/search-users?q=${encodeURIComponent(q)}&currentUserId=${currentUser.id}`);
        const users = await res.json();
        if (users.length === 0) { searchResultsDiv.classList.add('hidden'); return; }
        searchResultsDiv.classList.remove('hidden');
        searchResultsDiv.innerHTML = users.map(u => `<div class="search-result-item" data-id="${u.id}" data-name="${u.username}">${escapeHtml(u.username)} <span style="color:#2aff9e;">+</span></div>`).join('');
        document.querySelectorAll('.search-result-item').forEach(el => {
            el.onclick = () => {
                const friendId = el.dataset.id;
                const friendName = el.dataset.name;
                if (friendsMap.has(parseInt(friendId))) { alert('Уже в друзьях'); return; }
                currentSocket.emit('add_friend', { targetUsername: friendName });
                searchInput.value = '';
                searchResultsDiv.classList.add('hidden');
            };
        });
    });

    async function startMessenger() {
        authContainer.classList.add('hidden');
        messengerContainer.classList.remove('hidden');
        document.getElementById('myUsername').innerText = currentUser.username;
        initSocket();
        await loadFriends();
    }

    function logout() {
        if (currentSocket) currentSocket.disconnect();
        delCookie('swolts_token');
        location.reload();
    }

    // Переключение форм
    document.getElementById('showRegBtn').onclick = () => {
        document.getElementById('loginForm').classList.add('hidden');
        document.getElementById('regForm').classList.remove('hidden');
        // сброс капчи
        captchaPassed = false;
        captchaBtn.classList.remove('active');
        captchaHint.textContent = 'нажмите, чтобы подтвердить';
        captchaHint.style.color = '#ff5e7c';
    };
    document.getElementById('backToLoginBtn').onclick = () => {
        document.getElementById('regForm').classList.add('hidden');
        document.getElementById('loginForm').classList.remove('hidden');
        authError.classList.add('hidden');
    };
    document.getElementById('doLoginBtn').onclick = handleLogin;
    document.getElementById('doRegBtn').onclick = handleRegister;
    document.getElementById('logoutBtn').onclick = logout;
    sendBtn.onclick = sendMessage;
    messageInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });

    // Автовход по куке
    const token = getCookie('swolts_token');
    if (token) {
        const payload = parseJwt(token);
        if (payload && payload.id) {
            currentUser = { id: payload.id, username: payload.username };
            startMessenger();
        } else {
            authContainer.classList.remove('hidden');
        }
    } else {
        authContainer.classList.remove('hidden');
    }
</script>
</body>
</html>
