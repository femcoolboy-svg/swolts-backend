<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Swolts — как Discord, только без VPN</title>
    <script src="/socket.io/socket.io.js"></script>
    <!-- Font Awesome 6 (бесплатные иконки) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
            background: #0e0e10;
            height: 100vh;
            overflow: hidden;
            color: #e4e4e4;
        }

        /* Основной контейнер (как в Discord — три колонки) */
        .app {
            display: flex;
            height: 100vh;
            width: 100%;
        }

        /* ===== ЛЕВАЯ ПАНЕЛЬ (сервера / каналы) ===== */
        .sidebar-left {
            width: 72px;
            background: #1e1f22;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 0;
            gap: 8px;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .server-icon {
            width: 48px;
            height: 48px;
            background: #2b2d31;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            cursor: pointer;
            position: relative;
        }

        .server-icon.active {
            border-radius: 16px;
            background: #5865f2;
        }

        .server-icon i {
            font-size: 24px;
            color: #dbdee1;
        }

        .server-icon.active i {
            color: white;
        }

        /* ===== ПАНЕЛЬ КАНАЛОВ (вторая левая) ===== */
        .channels-panel {
            width: 240px;
            background: #2b2d31;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .server-header {
            padding: 16px;
            border-bottom: 1px solid #1e1f22;
            font-weight: 600;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            color: #f2f3f5;
        }

        .server-header i {
            font-size: 12px;
            color: #b5bac1;
        }

        .channel-list {
            flex: 1;
            padding: 8px;
        }

        .channel-category {
            padding: 16px 8px 4px 8px;
            font-size: 12px;
            font-weight: 600;
            color: #949ba4;
            letter-spacing: 0.5px;
        }

        .channel-item {
            padding: 6px 8px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #b5bac1;
            cursor: pointer;
            transition: background 0.1s;
            margin: 1px 0;
        }

        .channel-item:hover {
            background: #35373c;
            color: #f2f3f5;
        }

        .channel-item.active {
            background: #35373c;
            color: #f2f3f5;
        }

        .channel-item i {
            font-size: 20px;
            width: 24px;
            text-align: center;
        }

        /* ===== ОСНОВНАЯ ОБЛАСТЬ ЧАТА ===== */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #313338;
            min-width: 0; /* предотвращает переполнение */
        }

        .chat-header {
            padding: 12px 16px;
            border-bottom: 1px solid #1e1f22;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #2b2d31;
            box-shadow: 0 1px 0 #1e1f22;
        }

        .chat-header-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chat-header-left h3 {
            font-size: 16px;
            font-weight: 600;
        }

        .chat-header-left i {
            color: #5865f2;
        }

        .user-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .online-badge {
            background: #1e1f22;
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .online-badge i {
            font-size: 10px;
            color: #23a55a;
        }

        .logout-btn {
            background: none;
            border: none;
            color: #f23f42;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .logout-btn:hover {
            background: #1e1f22;
        }

        /* Сообщения */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px 0;
            display: flex;
            flex-direction: column;
        }

        .message-group {
            display: flex;
            gap: 16px;
            padding: 8px 16px;
            transition: background 0.1s;
        }

        .message-group:hover {
            background: #35373c;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #5865f2;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            text-transform: uppercase;
            flex-shrink: 0;
        }

        .message-content {
            flex: 1;
        }

        .message-header {
            display: flex;
            align-items: baseline;
            gap: 8px;
            margin-bottom: 4px;
        }

        .message-username {
            font-weight: 600;
            color: #f2f3f5;
            font-size: 15px;
        }

        .message-time {
            font-size: 11px;
            color: #949ba4;
        }

        .message-text {
            font-size: 15px;
            line-height: 1.4;
            color: #dbdee1;
            word-wrap: break-word;
        }

        /* Поле ввода */
        .input-wrapper {
            padding: 0 16px 24px 16px;
            background: #313338;
        }

        .input-container {
            background: #383a40;
            border-radius: 8px;
            display: flex;
            align-items: center;
            padding: 8px 16px;
            gap: 12px;
        }

        .input-container input {
            flex: 1;
            background: none;
            border: none;
            color: #f2f3f5;
            font-size: 15px;
            padding: 10px 0;
            outline: none;
        }

        .input-container input::placeholder {
            color: #949ba4;
        }

        .input-container button {
            background: #5865f2;
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        .input-container button:hover {
            background: #4752c4;
        }

        /* ===== ПРАВАЯ ПАНЕЛЬ (участники онлайн) ===== */
        .sidebar-right {
            width: 240px;
            background: #2b2d31;
            border-left: 1px solid #1e1f22;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .members-header {
            padding: 24px 16px 12px 16px;
            font-size: 12px;
            font-weight: 600;
            color: #949ba4;
            letter-spacing: 0.5px;
        }

        .members-list {
            flex: 1;
            padding: 0 8px;
        }

        .member-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 12px;
            border-radius: 8px;
            margin: 2px 0;
            cursor: pointer;
        }

        .member-item:hover {
            background: #35373c;
        }

        .member-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #5865f2;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }

        .member-name {
            font-size: 14px;
            color: #dbdee1;
        }

        .online-dot {
            width: 10px;
            height: 10px;
            background: #23a55a;
            border-radius: 50%;
            margin-left: auto;
        }

        /* Скрытие панелей на маленьких экранах (адаптив) */
        @media (max-width: 768px) {
            .sidebar-left, .sidebar-right, .channels-panel {
                display: none;
            }
        }

        /* Стили для формы авторизации (та же тема) */
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #1e1f22;
        }

        .auth-card {
            background: #2b2d31;
            border-radius: 16px;
            padding: 32px;
            width: 400px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .auth-card h2 {
            color: #f2f3f5;
            margin-bottom: 24px;
            text-align: center;
        }

        .auth-card input {
            width: 100%;
            padding: 12px;
            margin-bottom: 16px;
            background: #1e1f22;
            border: none;
            border-radius: 8px;
            color: #f2f3f5;
            font-size: 14px;
        }

        .auth-card button {
            width: 100%;
            padding: 12px;
            background: #5865f2;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 8px;
        }

        .auth-switch {
            text-align: center;
            margin-top: 16px;
            font-size: 14px;
            color: #b5bac1;
            cursor: pointer;
        }

        .auth-switch span {
            color: #5865f2;
        }

        .error-msg {
            color: #f23f42;
            font-size: 12px;
            margin-top: 8px;
            text-align: center;
        }
    </style>
</head>
<body>
<div id="app"></div>

<script>
    // Глобальные переменные
    let socket = null;
    let currentUser = null;
    let onlineUsersList = []; // для отображения в правой панели

    // Функция отрисовки приложения (либо форма, либо чат)
    function renderAuthForm() {
        document.getElementById('app').innerHTML = `
            <div class="auth-container">
                <div class="auth-card">
                    <h2><i class="fab fa-discord"></i> Swolts</h2>
                    <input type="text" id="authUsername" placeholder="Имя пользователя">
                    <input type="password" id="authPassword" placeholder="Пароль">
                    <button id="authBtn">Войти</button>
                    <div class="auth-switch" id="toggleAuth">Нет аккаунта? <span>Зарегистрироваться</span></div>
                    <div id="authError" class="error-msg"></div>
                </div>
            </div>
        `;
        attachAuthEvents();
    }

    function attachAuthEvents() {
        let isLoginMode = true;
        const authBtn = document.getElementById('authBtn');
        const toggle = document.getElementById('toggleAuth');
        const authError = document.getElementById('authError');
        const usernameInput = document.getElementById('authUsername');
        const passwordInput = document.getElementById('authPassword');

        const handleAuth = async () => {
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();
            if (!username || !password) {
                authError.textContent = 'Заполните все поля';
                return;
            }
            const endpoint = isLoginMode ? '/login' : '/register';
            try {
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Ошибка');
                localStorage.setItem('swolts_token', data.token);
                localStorage.setItem('swolts_user', JSON.stringify({ id: data.id, username: data.username }));
                initChat();
            } catch (err) {
                authError.textContent = err.message;
            }
        };

        authBtn.onclick = handleAuth;
        usernameInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleAuth(); });
        passwordInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleAuth(); });
        toggle.onclick = () => {
            isLoginMode = !isLoginMode;
            authBtn.textContent = isLoginMode ? 'Войти' : 'Зарегистрироваться';
            toggle.innerHTML = isLoginMode ? 'Нет аккаунта? <span>Зарегистрироваться</span>' : 'Уже есть аккаунт? <span>Войти</span>';
            authError.textContent = '';
        };
    }

    function formatTime(timestamp) {
        const date = new Date(timestamp);
        return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function getInitials(username) {
        return username.charAt(0).toUpperCase();
    }

    function getColorFromUsername(username) {
        let hash = 0;
        for (let i = 0; i < username.length; i++) {
            hash = username.charCodeAt(i) + ((hash << 5) - hash);
        }
        const hue = Math.abs(hash % 360);
        return `hsl(${hue}, 70%, 55%)`;
    }

    function renderChatUI() {
        document.getElementById('app').innerHTML = `
            <div class="app">
                <!-- Левая панель с иконкой сервера -->
                <div class="sidebar-left">
                    <div class="server-icon active">
                        <i class="fab fa-discord"></i>
                    </div>
                </div>
                <!-- Панель каналов -->
                <div class="channels-panel">
                    <div class="server-header">
                        Swolts
                        <i class="fas fa-chevron-down"></i>
                    </div>
                    <div class="channel-list">
                        <div class="channel-category">ТЕКСТОВЫЕ КАНАЛЫ</div>
                        <div class="channel-item active">
                            <i class="fas fa-hashtag"></i>
                            <span>общий</span>
                        </div>
                    </div>
                </div>
                <!-- Основная область чата -->
                <div class="chat-main">
                    <div class="chat-header">
                        <div class="chat-header-left">
                            <i class="fas fa-hashtag"></i>
                            <h3>общий</h3>
                        </div>
                        <div class="user-actions">
                            <div class="online-badge" id="onlineCountDisplay">
                                <i class="fas fa-circle"></i>
                                <span>0 онлайн</span>
                            </div>
                            <button class="logout-btn" id="logoutBtn">
                                <i class="fas fa-sign-out-alt"></i> Выйти
                            </button>
                        </div>
                    </div>
                    <div class="messages-area" id="messagesArea">
                        <div style="text-align: center; padding: 40px; color: #949ba4;">✨ Добро пожаловать в Swolts — свобода общения без VPN ✨</div>
                    </div>
                    <div class="input-wrapper">
                        <div class="input-container">
                            <i class="fas fa-plus" style="color: #b5bac1;"></i>
                            <input type="text" id="messageInput" placeholder="Введите сообщение..." maxlength="500">
                            <button id="sendBtn">Отправить</button>
                        </div>
                    </div>
                </div>
                <!-- Правая панель: участники онлайн -->
                <div class="sidebar-right">
                    <div class="members-header">
                        УЧАСТНИКИ — <span id="membersCount">0</span>
                    </div>
                    <div class="members-list" id="membersList">
                        <!-- Список пользователей будет заполняться динамически -->
                    </div>
                </div>
            </div>
        `;
        attachChatEvents();
    }

    function attachChatEvents() {
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const logoutBtn = document.getElementById('logoutBtn');

        sendBtn.onclick = () => {
            const text = messageInput.value.trim();
            if (text && socket) {
                socket.emit('sendMessage', text);
                messageInput.value = '';
            }
        };
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendBtn.click();
        });
        logoutBtn.onclick = () => {
            if (socket) socket.disconnect();
            localStorage.removeItem('swolts_token');
            localStorage.removeItem('swolts_user');
            renderAuthForm();
        };
    }

    function addMessageToUI(msg, isOwn) {
        const messagesArea = document.getElementById('messagesArea');
        if (!messagesArea) return;
        // Удаляем заглушку, если она есть
        if (messagesArea.children.length === 1 && messagesArea.children[0].innerText.includes('Добро пожаловать')) {
            messagesArea.innerHTML = '';
        }
        const avatarColor = getColorFromUsername(msg.username);
        const messageDiv = document.createElement('div');
        messageDiv.className = 'message-group';
        messageDiv.innerHTML = `
            <div class="avatar" style="background: ${avatarColor};">${getInitials(msg.username)}</div>
            <div class="message-content">
                <div class="message-header">
                    <span class="message-username">${escapeHtml(msg.username)}</span>
                    <span class="message-time">${formatTime(msg.timestamp)}</span>
                </div>
                <div class="message-text">${escapeHtml(msg.text)}</div>
            </div>
        `;
        messagesArea.appendChild(messageDiv);
        messagesArea.scrollTop = messagesArea.scrollHeight;
    }

    function updateOnlineMembers(users) {
        onlineUsersList = users;
        const membersList = document.getElementById('membersList');
        const membersCountSpan = document.getElementById('membersCount');
        const onlineCountDisplay = document.getElementById('onlineCountDisplay');
        if (!membersList) return;
        if (onlineCountDisplay) {
            onlineCountDisplay.querySelector('span').textContent = `${users.length} онлайн`;
        }
        if (membersCountSpan) membersCountSpan.textContent = users.length;
        membersList.innerHTML = '';
        users.forEach(user => {
            const avatarColor = getColorFromUsername(user.username);
            const memberDiv = document.createElement('div');
            memberDiv.className = 'member-item';
            memberDiv.innerHTML = `
                <div class="member-avatar" style="background: ${avatarColor};">${getInitials(user.username)}</div>
                <div class="member-name">${escapeHtml(user.username)}</div>
                <div class="online-dot"></div>
            `;
            membersList.appendChild(memberDiv);
        });
    }

    function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    function initChat() {
        const token = localStorage.getItem('swolts_token');
        const userData = localStorage.getItem('swolts_user');
        if (!token || !userData) {
            renderAuthForm();
            return;
        }
        currentUser = JSON.parse(userData);
        renderChatUI();

        if (socket) socket.disconnect();
        socket = io({ auth: { token } });

        socket.on('connect', () => console.log('✅ Подключен к чату'));

        socket.on('messageHistory', (history) => {
            const messagesArea = document.getElementById('messagesArea');
            if (messagesArea) {
                messagesArea.innerHTML = '';
                history.forEach(msg => addMessageToUI(msg, msg.userId === currentUser.id));
                messagesArea.scrollTop = messagesArea.scrollHeight;
            }
        });

        socket.on('newMessage', (msg) => {
            addMessageToUI(msg, msg.userId === currentUser.id);
        });

        socket.on('onlineUsers', (users) => {
            updateOnlineMembers(users);
        });

        socket.on('connect_error', (err) => {
            console.error('Ошибка сокета:', err);
            alert('Не удалось подключиться к серверу. Проверьте, запущен ли сервер.');
            localStorage.clear();
            renderAuthForm();
        });
    }

    // Старт: проверяем, есть ли токен
    (function start() {
        const token = localStorage.getItem('swolts_token');
        const user = localStorage.getItem('swolts_user');
        if (token && user) {
            initChat();
        } else {
            renderAuthForm();
        }
    })();
</script>
</body>
</html>
