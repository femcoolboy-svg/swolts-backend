<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Swolts · кислотное будущее</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Share Tech Mono', 'Courier New', monospace;
            background: radial-gradient(circle at 20% 30%, #0a0f1a, #03050b);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            overflow: hidden;
        }

        /* главный контейнер — глитч-рамка */
        .app-wrapper {
            width: 100%;
            max-width: 1000px;
            height: 90vh;
            min-height: 520px;
            background: #0b0e17;
            border-radius: 28px;
            box-shadow: 0 0 20px rgba(0, 255, 100, 0.2), 0 0 5px rgba(157, 78, 221, 0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            backdrop-filter: blur(2px);
            border: 1px solid rgba(0, 255, 191, 0.3);
        }

        /* анимация мерцания */
        @keyframes neonPulse {
            0% { text-shadow: 0 0 2px #0f0, 0 0 5px #0f0; }
            100% { text-shadow: 0 0 5px #0f0, 0 0 15px #7c3aed; }
        }

        /* панель аутентификации — кислотный стиль */
        .auth-panel {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0b0e17;
        }

        .auth-card {
            background: rgba(10, 14, 23, 0.9);
            backdrop-filter: blur(8px);
            border-radius: 32px;
            padding: 32px 28px;
            width: 100%;
            max-width: 440px;
            border: 1px solid #2aff9e;
            box-shadow: 0 0 20px rgba(42, 255, 158, 0.2);
            transition: all 0.3s;
        }

        .auth-card h3 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #b57cff, #2aff9e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
            animation: neonPulse 1.5s infinite alternate;
        }

        .auth-card p {
            color: #9ca3af;
            margin-bottom: 28px;
            font-size: 14px;
            letter-spacing: 1px;
        }

        .input-group {
            margin-bottom: 22px;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #2aff9e;
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 60px;
            border: 1.5px solid #2c3a4e;
            background: #010101;
            color: #e2e8f0;
            font-size: 16px;
            font-family: monospace;
            transition: 0.2s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #b57cff;
            box-shadow: 0 0 0 3px rgba(181, 124, 255, 0.3);
        }

        .auth-buttons {
            display: flex;
            gap: 14px;
            margin-top: 16px;
        }

        .btn-primary {
            background: linear-gradient(95deg, #2aff9e, #7c3aed);
            border: none;
            padding: 12px 20px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 14px;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.2s;
            flex: 1;
            color: black;
            text-transform: uppercase;
        }

        .btn-primary:hover {
            transform: scale(0.97);
            box-shadow: 0 0 15px #2aff9e;
        }

        .btn-secondary {
            background: transparent;
            border: 1.5px solid #2aff9e;
            color: #2aff9e;
            padding: 12px 20px;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            flex: 1;
            text-transform: uppercase;
        }

        .btn-secondary:hover {
            background: rgba(42, 255, 158, 0.15);
            box-shadow: 0 0 8px #2aff9e;
        }

        .error-msg {
            color: #ff5e7c;
            background: rgba(255, 0, 55, 0.15);
            padding: 10px;
            border-radius: 60px;
            font-size: 12px;
            text-align: center;
            margin-top: 16px;
            border: 1px solid #ff3366;
        }

        /* Чат-интерфейс — тёмный неон */
        .chat-interface {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            background: #0b0e17;
        }

        .chat-header {
            padding: 18px 24px;
            border-bottom: 1px solid #2aff9e;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0b0e17;
            flex-shrink: 0;
        }

        .brand h2 {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(135deg, #b57cff, #2aff9e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .user-panel {
            display: flex;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
        }

        .username-badge {
            background: #010101;
            padding: 6px 16px;
            border-radius: 60px;
            font-size: 14px;
            font-weight: 500;
            color: #b57cff;
            border: 1px solid #b57cff;
            letter-spacing: 0.5px;
        }

        .online-count {
            background: #010101;
            color: #2aff9e;
            padding: 6px 14px;
            border-radius: 60px;
            font-size: 13px;
            font-weight: 500;
            border: 1px solid #2aff9e;
        }

        .logout-btn {
            background: none;
            border: 1px solid #ff5e7c;
            padding: 6px 18px;
            border-radius: 60px;
            color: #ff5e7c;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
            font-size: 12px;
        }

        .logout-btn:hover {
            background: #ff5e7c20;
            box-shadow: 0 0 8px #ff5e7c;
        }

        /* сообщения */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #070a12;
            scroll-behavior: smooth;
        }

        .messages-area::-webkit-scrollbar {
            width: 5px;
        }
        .messages-area::-webkit-scrollbar-track {
            background: #1a1f2e;
        }
        .messages-area::-webkit-scrollbar-thumb {
            background: #2aff9e;
            border-radius: 10px;
        }

        .message {
            max-width: 75%;
            padding: 10px 18px;
            border-radius: 28px;
            word-wrap: break-word;
            font-size: 14px;
            font-family monospace;
            animation: fadeIn 0.2s ease;
        }

        .message.own {
            background: linear-gradient(125deg, #1a2538, #0f1220);
            color: #e2e8f0;
            align-self: flex-end;
            border-bottom-right-radius: 6px;
            border-right: 2px solid #b57cff;
        }

        .message.other {
            background: #10131f;
            color: #cbd5e1;
            align-self: flex-start;
            border-bottom-left-radius: 6px;
            border-left: 2px solid #2aff9e;
        }

        .message-username {
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #b57cff;
        }

        .system-message {
            text-align: center;
            font-size: 11px;
            color: #7e8a98;
            background: #0f1422;
            padding: 6px 14px;
            border-radius: 60px;
            width: fit-content;
            align-self: center;
            border: 0.5px solid #2aff9e50;
        }

        .input-bar {
            flex-shrink: 0;
            padding: 18px 24px 24px;
            border-top: 1px solid #2aff9e40;
            background: #0b0e17;
            display: flex;
            gap: 12px;
        }

        .input-bar input {
            flex: 1;
            padding: 14px 20px;
            border-radius: 60px;
            border: 1.5px solid #2c3a4e;
            background: #010101;
            color: #e2e8f0;
            font-size: 15px;
            font-family: monospace;
        }

        .input-bar input:focus {
            outline: none;
            border-color: #b57cff;
            box-shadow: 0 0 0 2px #b57cff50;
        }

        .input-bar button {
            background: linear-gradient(95deg, #2aff9e, #7c3aed);
            border: none;
            padding: 12px 28px;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-bar button:hover {
            transform: scale(0.97);
            box-shadow: 0 0 12px #2aff9e;
        }

        .hidden {
            display: none !important;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px);}
            to { opacity: 1; transform: translateY(0);}
        }

        @media (max-width: 640px) {
            .message { max-width: 85%; }
            .user-panel { gap: 8px; }
        }
    </style>
</head>
<body>
<div class="app-wrapper" id="appWrapper">
    <!-- панель входа/регистрации (без почты, только логин+пароль) -->
    <div id="authContainer" class="auth-panel">
        <div class="auth-card">
            <h3>⚡ SWOLTS</h3>
            <p>КИСЛОТНОЕ БУДУЩЕЕ</p>
            <div id="authError" class="error-msg hidden"></div>
            <div class="input-group">
                <label>🔓 ЛОГИН</label>
                <input type="text" id="loginUsername" placeholder="никнейм" autocomplete="username">
            </div>
            <div class="input-group">
                <label>🗝️ ПАРОЛЬ</label>
                <input type="password" id="loginPassword" placeholder="••••••" autocomplete="current-password">
            </div>
            <div class="auth-buttons">
                <button class="btn-primary" id="doLoginBtn">ПРОДОЛЖИТЬ →</button>
                <button class="btn-secondary" id="showRegisterBtn">РЕГИСТРАЦИЯ</button>
            </div>
            <div id="registerForm" class="hidden" style="margin-top: 24px;">
                <div class="input-group">
                    <label>✨ НОВЫЙ ЛОГИН</label>
                    <input type="text" id="regUsername" placeholder="от 3 символов">
                </div>
                <div class="input-group">
                    <label>⚡ ПАРОЛЬ</label>
                    <input type="password" id="regPassword" placeholder="минимум 4 символа">
                </div>
                <div class="auth-buttons">
                    <button class="btn-primary" id="doRegisterBtn">ДОБРО</button>
                    <button class="btn-secondary" id="backToLoginBtn">НАЗАД</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Чат (кислотный интерфейс) -->
    <div id="chatInterface" class="chat-interface hidden">
        <div class="chat-header">
            <div class="brand"><h2>🌀 SWOLTS // CHAOS</h2></div>
            <div class="user-panel">
                <span class="username-badge" id="chatUsername">—</span>
                <span class="online-count" id="onlineUsersBadge">⚡ 0 онлайн</span>
                <button class="logout-btn" id="chatLogoutBtn">ВЫЙТИ</button>
            </div>
        </div>
        <div class="messages-area" id="messagesList">
            <div class="system-message">🌀 подключение к неон-сети...</div>
        </div>
        <div class="input-bar">
            <input type="text" id="chatMessageInput" placeholder="сообщение..." maxlength="500">
            <button id="sendMessageBtn">ОТПРАВИТЬ</button>
        </div>
    </div>
</div>

<script>
    // ---------- КУКИ (токен) ----------
    function setCookie(name, value, days = 7) {
        const expires = new Date(Date.now() + days * 864e5).toUTCString();
        document.cookie = `${name}=${value}; path=/; expires=${expires}; SameSite=Lax`;
    }
    function getCookie(name) {
        const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
        return match ? match[2] : null;
    }
    function deleteCookie(name) { document.cookie = `${name}=; path=/; expires=Thu, 01 Jan 1970 00:00:00 UTC;`; }

    function parseJwt(token) {
        try {
            const base64 = token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
            return JSON.parse(atob(base64));
        } catch { return null; }
    }

    let currentSocket = null;
    let currentUser = null;

    // DOM элементы
    const authDiv = document.getElementById('authContainer');
    const chatDiv = document.getElementById('chatInterface');
    const messagesBox = document.getElementById('messagesList');
    const errorDiv = document.getElementById('authError');

    function showAuthError(msg) { errorDiv.textContent = msg; errorDiv.classList.remove('hidden'); setTimeout(() => errorDiv.classList.add('hidden'), 3000); }
    function addSystemMessage(text) {
        const sys = document.createElement('div'); sys.className = 'system-message'; sys.textContent = text;
        messagesBox.appendChild(sys); messagesBox.scrollTop = messagesBox.scrollHeight;
        setTimeout(() => sys.remove(), 4000);
    }
    function addMessageToChat(msg, isOwn) {
        const div = document.createElement('div'); div.className = `message ${isOwn ? 'own' : 'other'}`;
        div.innerHTML = `<div class="message-username">${escapeHtml(msg.username)}</div><div>${escapeHtml(msg.text)}</div>`;
        messagesBox.appendChild(div); messagesBox.scrollTop = messagesBox.scrollHeight;
    }
    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    function logoutAndReset() {
        if (currentSocket) { currentSocket.disconnect(); currentSocket = null; }
        deleteCookie('swolts_token');
        currentUser = null;
        chatDiv.classList.add('hidden');
        authDiv.classList.remove('hidden');
        document.getElementById('loginUsername').value = '';
        document.getElementById('loginPassword').value = '';
        document.getElementById('regUsername').value = '';
        document.getElementById('regPassword').value = '';
        document.getElementById('registerForm').classList.add('hidden');
        document.getElementById('doLoginBtn').parentElement.style.display = 'flex';
        document.getElementById('showRegisterBtn').style.display = 'block';
        messagesBox.innerHTML = '<div class="system-message">🌀 готов к переподключению</div>';
    }

    function startChatWithToken(token, userPayload) {
        if (!token || !userPayload) { logoutAndReset(); return false; }
        currentUser = { id: userPayload.id, username: userPayload.username };
        authDiv.classList.add('hidden');
        chatDiv.classList.remove('hidden');
        document.getElementById('chatUsername').innerText = currentUser.username;
        messagesBox.innerHTML = '<div class="system-message">⚡ загрузка истории...</div>';

        currentSocket = io({ auth: { token } });
        currentSocket.on('connect', () => addSystemMessage('✅ неон-соединение установлено'));
        currentSocket.on('messageHistory', (history) => {
            messagesBox.innerHTML = '';
            if (!history.length) addSystemMessage('🌀 пустой эфир. напиши первое сообщение');
            history.forEach(msg => addMessageToChat(msg, msg.userId === currentUser.id));
        });
        currentSocket.on('newMessage', (msg) => addMessageToChat(msg, msg.userId === currentUser.id));
        currentSocket.on('onlineUsers', (users) => document.getElementById('onlineUsersBadge').innerHTML = `⚡ ${users.length} онлайн`);
        currentSocket.on('user_joined', (data) => addSystemMessage(`✨ ${data.username} ворвался в чат`));
        currentSocket.on('user_left', (data) => addSystemMessage(`💀 ${data.username} испарился`));
        currentSocket.on('connect_error', (err) => { addSystemMessage('⚠️ сбой соединения'); if(err.message === 'Authentication error') logoutAndReset(); });
        return true;
    }

    async function apiRequest(url, data) {
        const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
        const json = await res.json();
        if (!res.ok) throw new Error(json.message || 'ошибка');
        return json;
    }

    async function handleLogin() {
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value;
        if (!username || !password) return showAuthError('заполни логин и пароль');
        try {
            const data = await apiRequest('/api/login', { username, password });
            setCookie('swolts_token', data.token, 7);
            const payload = parseJwt(data.token) || { id: data.userId, username: data.username };
            startChatWithToken(data.token, payload);
        } catch(e) { showAuthError(e.message); }
    }

    async function handleRegister() {
        const username = document.getElementById('regUsername').value.trim();
        const password = document.getElementById('regPassword').value;
        if (username.length < 3) return showAuthError('логин минимум 3 символа');
        if (password.length < 4) return showAuthError('пароль минимум 4 символа');
        try {
            const data = await apiRequest('/api/register', { username, password });
            setCookie('swolts_token', data.token, 7);
            const payload = parseJwt(data.token) || { id: data.userId, username: data.username };
            startChatWithToken(data.token, payload);
        } catch(e) { showAuthError(e.message); }
    }

    // ---- Обработчики UI (соответствуют "кислотному" описанию) ----
    document.getElementById('doLoginBtn').onclick = handleLogin;
    document.getElementById('showRegisterBtn').onclick = () => {
        document.getElementById('registerForm').classList.remove('hidden');
        document.getElementById('doLoginBtn').parentElement.style.display = 'none';
        document.getElementById('showRegisterBtn').style.display = 'none';
    };
    document.getElementById('backToLoginBtn').onclick = () => {
        document.getElementById('registerForm').classList.add('hidden');
        document.getElementById('doLoginBtn').parentElement.style.display = 'flex';
        document.getElementById('showRegisterBtn').style.display = 'block';
    };
    document.getElementById('doRegisterBtn').onclick = handleRegister;
    document.getElementById('chatLogoutBtn').onclick = logoutAndReset;
    document.getElementById('sendMessageBtn').onclick = () => {
        if(currentSocket && currentUser) {
            const txt = document.getElementById('chatMessageInput').value.trim();
            if(txt) currentSocket.emit('sendMessage', txt);
            document.getElementById('chatMessageInput').value = '';
        }
    };
    document.getElementById('chatMessageInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') document.getElementById('sendMessageBtn').click(); });

    // автовход по куке
    const tokenFromCookie = getCookie('swolts_token');
    if (tokenFromCookie) {
        const payload = parseJwt(tokenFromCookie);
        if (payload && payload.username) startChatWithToken(tokenFromCookie, payload);
        else logoutAndReset();
    } else { logoutAndReset(); }
</script>
</body>
</html>
