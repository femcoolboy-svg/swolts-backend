<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Swolts · Discord-like мессенджер</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Share Tech Mono', monospace;
            background: radial-gradient(circle at 20% 30%, #0a0f1a, #03050b);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        /* главный контейнер */
        .app-wrapper {
            width: 100%;
            max-width: 1300px;
            height: 90vh;
            background: #0b0e17;
            border-radius: 28px;
            box-shadow: 0 0 20px rgba(0, 255, 100, 0.2);
            display: flex;
            overflow: hidden;
            border: 1px solid #2aff9e;
        }
        /* боковая панель (список друзей) */
        .sidebar {
            width: 280px;
            background: #070a12;
            border-right: 1px solid #2aff9e40;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #2aff9e30;
        }
        .sidebar-header h3 {
            color: #2aff9e;
            font-size: 1.2rem;
            letter-spacing: 2px;
        }
        .search-add {
            padding: 12px;
            border-bottom: 1px solid #2aff9e30;
        }
        .search-add input {
            width: 100%;
            padding: 8px 12px;
            background: #010101;
            border: 1px solid #2c3a4e;
            border-radius: 40px;
            color: white;
            font-size: 12px;
        }
        .search-results {
            background: #0f1422;
            margin-top: 6px;
            border-radius: 16px;
            max-height: 150px;
            overflow-y: auto;
        }
        .search-result-item {
            padding: 8px 12px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #2aff9e20;
        }
        .search-result-item:hover { background: #2aff9e20; }
        .friend-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }
        .friend-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            border-radius: 20px;
            cursor: pointer;
            margin-bottom: 6px;
            transition: 0.1s;
        }
        .friend-item:hover { background: #1e2a3a; }
        .friend-item.active { background: #2aff9e20; border-left: 3px solid #2aff9e; }
        .friend-status { width: 10px; height: 10px; border-radius: 10px; background: #4ade80; box-shadow: 0 0 4px #4ade80; }
        .friend-status.offline { background: #5f6c84; box-shadow: none; }
        .friend-name { flex: 1; color: #e2e8f0; font-size: 14px; }
        /* чат область */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0b0e17;
        }
        .chat-header {
            padding: 18px 24px;
            border-bottom: 1px solid #2aff9e40;
            color: #b57cff;
            font-weight: bold;
        }
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            max-width: 70%;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 14px;
        }
        .message.own {
            background: linear-gradient(125deg, #1a2538, #0f1220);
            align-self: flex-end;
            border-right: 2px solid #b57cff;
        }
        .message.other {
            background: #10131f;
            align-self: flex-start;
            border-left: 2px solid #2aff9e;
        }
        .message-user { font-size: 11px; color: #b57cff; margin-bottom: 4px; }
        .input-area {
            padding: 20px;
            border-top: 1px solid #2aff9e40;
            display: flex;
            gap: 12px;
        }
        .input-area input {
            flex: 1;
            padding: 12px;
            border-radius: 60px;
            background: #010101;
            border: 1px solid #2c3a4e;
            color: white;
        }
        .input-area button {
            background: linear-gradient(95deg, #2aff9e, #7c3aed);
            border: none;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
        }
        /* панель авторизации */
        .auth-panel {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .auth-card {
            background: #0b0e17;
            border: 1px solid #2aff9e;
            border-radius: 32px;
            padding: 32px;
            max-width: 400px;
        }
        .hidden { display: none !important; }
        .error-msg { color: #ff5e7c; background: #330000; padding: 8px; border-radius: 40px; text-align: center; margin-top: 12px; }
        button, .search-result-item { cursor: pointer; }
        ::-webkit-scrollbar { width: 5px; }
    </style>
</head>
<body>
<div class="app-wrapper" id="appWrapper">
    <!-- Аутентификация -->
    <div id="authContainer" class="auth-panel">
        <div class="auth-card">
            <h3 style="color:#2aff9e;">⚡ SWOLTS</h3>
            <p style="color:#aaa;">мессенджер будущего</p>
            <div id="authError" class="error-msg hidden"></div>
            <div class="input-group"><label>ЛОГИН</label><input id="loginUsername" type="text"></div>
            <div class="input-group"><label>ПАРОЛЬ</label><input id="loginPassword" type="password"></div>
            <div class="auth-buttons" style="display:flex; gap:12px; margin-top:16px;">
                <button id="doLoginBtn" style="background:#2aff9e; flex:1;">Войти</button>
                <button id="showRegisterBtn" style="background:transparent; border:1px solid #2aff9e; flex:1;">Регистрация</button>
            </div>
            <div id="registerForm" class="hidden" style="margin-top:20px;">
                <input id="regUsername" placeholder="Логин (мин 3)" style="width:100%; margin-bottom:8px; padding:8px;"><br>
                <input id="regPassword" type="password" placeholder="Пароль (мин 4)" style="width:100%; margin-bottom:8px; padding:8px;">
                <button id="doRegisterBtn" style="background:#b57cff;">Создать</button>
                <button id="backToLoginBtn">Назад</button>
            </div>
        </div>
    </div>

    <!-- Основной интерфейс мессенджера -->
    <div id="messengerInterface" class="hidden" style="display: flex; width: 100%;">
        <div class="sidebar">
            <div class="sidebar-header"><h3>👥 ДРУЗЬЯ</h3></div>
            <div class="search-add">
                <input type="text" id="searchFriendInput" placeholder="Найти по нику...">
                <div id="searchResults" class="search-results hidden"></div>
            </div>
            <div class="friend-list" id="friendsList"></div>
            <div style="padding:12px; border-top:1px solid #2aff9e30;">
                <span id="myUsername" style="color:#b57cff;"></span>
                <button id="logoutBtn" style="float:right; background:none; border:1px solid #ff5e7c; color:#ff5e7c; border-radius:40px; padding:4px 12px;">Выйти</button>
            </div>
        </div>
        <div class="chat-area">
            <div class="chat-header" id="chatWithLabel">🤖 Выберите друга</div>
            <div class="messages-container" id="messagesList"><div class="system-message" style="color:#aaa;">👈 Нажмите на друга чтобы начать чат</div></div>
            <div class="input-area" id="inputArea" style="display: none;">
                <input type="text" id="messageInput" placeholder="Сообщение..." maxlength="500">
                <button id="sendMsgBtn">Отправить</button>
            </div>
        </div>
    </div>
</div>

<script>
    // ---- Куки ----
    function setCookie(n,v,d=7){let e=new Date(Date.now()+d*864e5).toUTCString();document.cookie=`${n}=${v}; path=/; expires=${e}; SameSite=Lax`;}
    function getCookie(n){let m=document.cookie.match(new RegExp('(^| )'+n+'=([^;]+)'));return m?m[2]:null;}
    function delCookie(n){document.cookie=`${n}=; path=/; expires=Thu, 01 Jan 1970 00:00:00 UTC;`;}

    function parseJwt(t){try{return JSON.parse(atob(t.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));}catch(e){return null;}}

    let currentUser = null;
    let currentSocket = null;
    let currentFriend = null; // выбранный друг { id, username }
    let friendsMap = new Map(); // id -> friend object

    // DOM
    const authDiv = document.getElementById('authContainer');
    const messengerDiv = document.getElementById('messengerInterface');
    const friendsListDiv = document.getElementById('friendsList');
    const searchInput = document.getElementById('searchFriendInput');
    const searchResultsDiv = document.getElementById('searchResults');
    const messagesContainer = document.getElementById('messagesList');
    const chatWithLabel = document.getElementById('chatWithLabel');
    const inputArea = document.getElementById('inputArea');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendMsgBtn');

    function showAuthError(msg){ let e=document.getElementById('authError'); e.textContent=msg; e.classList.remove('hidden'); setTimeout(()=>e.classList.add('hidden'),3000); }

    // Загрузка списка друзей с сервера
    async function loadFriends() {
        const res = await fetch(`/api/friends?userId=${currentUser.id}`);
        const friends = await res.json();
        friendsMap.clear();
        friends.forEach(f => { friendsMap.set(f.id, f); });
        renderFriendsList();
    }

    function renderFriendsList() {
        friendsListDiv.innerHTML = '';
        for (let f of friendsMap.values()) {
            const div = document.createElement('div');
            div.className = `friend-item ${currentFriend && currentFriend.id === f.id ? 'active' : ''}`;
            div.innerHTML = `<div class="friend-status ${f.online ? '' : 'offline'}"></div>
                             <div class="friend-name">${escapeHtml(f.username)}</div>`;
            div.onclick = () => selectFriend(f);
            friendsListDiv.appendChild(div);
        }
        if (friendsMap.size === 0) friendsListDiv.innerHTML = '<div style="color:#777; padding:12px;">Нет друзей. Добавьте через поиск.</div>';
    }

    async function selectFriend(friend) {
        currentFriend = friend;
        chatWithLabel.innerHTML = `💬 Чат с ${escapeHtml(friend.username)} ${friend.online ? '🟢' : '⚫'}`;
        inputArea.style.display = 'flex';
        // загрузить историю сообщений
        const res = await fetch(`/api/messages/${friend.id}?myId=${currentUser.id}`);
        const msgs = await res.json();
        messagesContainer.innerHTML = '';
        msgs.forEach(msg => {
            const isOwn = msg.from === currentUser.id;
            addMessageToUI(msg, isOwn);
        });
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function addMessageToUI(msg, isOwn) {
        const div = document.createElement('div');
        div.className = `message ${isOwn ? 'own' : 'other'}`;
        const username = isOwn ? currentUser.username : currentFriend.username;
        div.innerHTML = `<div class="message-user">${escapeHtml(username)}</div><div>${escapeHtml(msg.text)}</div>`;
        messagesContainer.appendChild(div);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    // Поиск пользователей
    searchInput.addEventListener('input', async () => {
        const q = searchInput.value.trim();
        if (q.length < 2) { searchResultsDiv.classList.add('hidden'); return; }
        const res = await fetch(`/api/search-users?q=${encodeURIComponent(q)}&currentUserId=${currentUser.id}`);
        const users = await res.json();
        if (users.length === 0) { searchResultsDiv.classList.add('hidden'); return; }
        searchResultsDiv.classList.remove('hidden');
        searchResultsDiv.innerHTML = users.map(u => `<div class="search-result-item" data-id="${u.id}" data-name="${u.username}">${escapeHtml(u.username)} <span style="color:#2aff9e;">+</span></div>`).join('');
        document.querySelectorAll('.search-result-item').forEach(el => {
            el.onclick = () => addFriend(el.dataset.id, el.dataset.name);
        });
    });

    async function addFriend(friendId, friendUsername) {
        if (friendsMap.has(parseInt(friendId))) { alert('Уже в друзьях'); return; }
        currentSocket.emit('add_friend', { targetUsername: friendUsername });
        searchInput.value = '';
        searchResultsDiv.classList.add('hidden');
    }

    // Socket обработчики
    function initSocket() {
        if (currentSocket) currentSocket.disconnect();
        const token = getCookie('swolts_token');
        currentSocket = io({ auth: { token } });
        currentSocket.on('connect', () => console.log('socket connected'));
        currentSocket.on('friend_added', (newFriend) => {
            friendsMap.set(newFriend.id, newFriend);
            renderFriendsList();
        });
        currentSocket.on('friend_status', ({ userId, online }) => {
            if (friendsMap.has(userId)) {
                friendsMap.get(userId).online = online;
                renderFriendsList();
                if (currentFriend && currentFriend.id === userId) {
                    chatWithLabel.innerHTML = `💬 Чат с ${escapeHtml(currentFriend.username)} ${online ? '🟢' : '⚫'}`;
                }
            }
        });
        currentSocket.on('new_private_message', (msg) => {
            // если это сообщение от текущего выбранного друга или ему
            if ((msg.from === currentUser.id && msg.to === currentFriend?.id) ||
                (msg.from === currentFriend?.id && msg.to === currentUser.id)) {
                addMessageToUI(msg, msg.from === currentUser.id);
            }
            // обновить список сообщений (можно перезагрузить, но просто добавляем)
        });
        currentSocket.on('friend_error', (err) => alert(err));
    }

    function sendMessage() {
        if (!currentFriend) return alert('Выберите друга');
        const text = messageInput.value.trim();
        if (!text) return;
        currentSocket.emit('private_message', { toUserId: currentFriend.id, text });
        messageInput.value = '';
    }

    // Выход
    function logout() {
        if (currentSocket) currentSocket.disconnect();
        delCookie('swolts_token');
        location.reload();
    }

    // Авторизация
    async function apiRequest(url, data) {
        const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
        const json = await res.json();
        if (!res.ok) throw new Error(json.message);
        return json;
    }

    async function handleLogin() {
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value;
        if (!username || !password) return showAuthError('Заполните поля');
        try {
            const data = await apiRequest('/api/login', { username, password });
            setCookie('swolts_token', data.token, 7);
            const payload = parseJwt(data.token);
            currentUser = { id: payload.id, username: payload.username };
            startApp();
        } catch(e) { showAuthError(e.message); }
    }

    async function handleRegister() {
        const username = document.getElementById('regUsername').value.trim();
        const password = document.getElementById('regPassword').value;
        if (username.length<3 || password.length<4) return showAuthError('Логин>=3, пароль>=4');
        try {
            const data = await apiRequest('/api/register', { username, password });
            setCookie('swolts_token', data.token, 7);
            const payload = parseJwt(data.token);
            currentUser = { id: payload.id, username: payload.username };
            startApp();
        } catch(e) { showAuthError(e.message); }
    }

    async function startApp() {
        authDiv.classList.add('hidden');
        messengerDiv.classList.remove('hidden');
        document.getElementById('myUsername').innerText = currentUser.username;
        initSocket();
        await loadFriends();
        // авто-обновление через сокеты уже есть
        // дополнительно можно подписаться на события
    }

    // UI обработчики
    document.getElementById('doLoginBtn').onclick = handleLogin;
    document.getElementById('showRegisterBtn').onclick = () => {
        document.getElementById('registerForm').classList.remove('hidden');
        document.getElementById('doLoginBtn').parentElement.style.display = 'none';
        document.getElementById('showRegisterBtn').style.display = 'none';
    };
    document.getElementById('backToLoginBtn').onclick = () => {
        document.getElementById('registerForm').classList.add('hidden');
        document.getElementById('doLoginBtn').parentElement.style.display = 'flex';
        document.getElementById('showRegisterBtn').style.display = 'block';
    };
    document.getElementById('doRegisterBtn').onclick = handleRegister;
    document.getElementById('logoutBtn').onclick = logout;
    sendBtn.onclick = sendMessage;
    messageInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });

    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[m];}); }

    // автовход
    const token = getCookie('swolts_token');
    if (token) {
        const payload = parseJwt(token);
        if (payload && payload.id) {
            currentUser = { id: payload.id, username: payload.username };
            startApp();
        } else { authDiv.classList.remove('hidden'); }
    } else { authDiv.classList.remove('hidden'); }
</script>
</body>
</html>
