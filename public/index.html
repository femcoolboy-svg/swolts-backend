<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swolts — чат и друзья</title>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Главное окно (не на весь экран) */
        .app-window {
            width: 1300px;
            max-width: 95vw;
            height: 85vh;
            background: #16213e;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            display: flex;
            overflow: hidden;
            backdrop-filter: blur(2px);
        }

        /* Боковая панель навигации */
        .nav-sidebar {
            width: 80px;
            background: #0f3460;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            gap: 30px;
        }

        .nav-item {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 18px;
            background: #1a1a2e;
            color: #e94560;
            cursor: pointer;
            transition: 0.2s;
            font-size: 24px;
        }

        .nav-item.active {
            background: #e94560;
            color: white;
            box-shadow: 0 0 12px #e94560;
        }

        .nav-item:hover:not(.active) {
            background: #533483;
            color: white;
        }

        /* Контентная область */
        .content-area {
            flex: 1;
            display: flex;
            background: #1a1a2e;
        }

        /* Левая панель (список чатов / друзей) */
        .left-panel {
            width: 280px;
            background: #0f3460;
            border-right: 1px solid #533483;
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            padding: 20px;
            border-bottom: 1px solid #533483;
            font-weight: bold;
            color: #e94560;
            font-size: 18px;
        }

        .friends-list, .chats-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .friend-item, .chat-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 16px;
            margin-bottom: 6px;
            cursor: pointer;
            transition: 0.1s;
            color: #eee;
        }

        .friend-item:hover, .chat-item:hover {
            background: #533483;
        }

        .friend-avatar {
            width: 40px;
            height: 40px;
            background: #e94560;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .friend-info {
            flex: 1;
        }

        .friend-name {
            font-weight: 500;
        }

        .online-status {
            font-size: 11px;
            color: #4ade80;
        }

        /* Правая панель (чат или раздел друзей) */
        .right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #16213e;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message-bubble {
            max-width: 70%;
            padding: 10px 16px;
            border-radius: 20px;
            background: #0f3460;
            color: white;
            align-self: flex-start;
        }

        .message-bubble.own {
            background: #e94560;
            align-self: flex-end;
        }

        .message-username {
            font-size: 12px;
            opacity: 0.7;
            margin-bottom: 4px;
        }

        .input-area {
            padding: 16px;
            background: #0f3460;
            display: flex;
            gap: 12px;
        }

        .input-area input {
            flex: 1;
            padding: 12px;
            border-radius: 28px;
            border: none;
            background: #1a1a2e;
            color: white;
        }

        .input-area button {
            background: #e94560;
            border: none;
            padding: 0 20px;
            border-radius: 28px;
            color: white;
            cursor: pointer;
        }

        /* Раздел друзей */
        .friends-section {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .search-add {
            display: flex;
            gap: 10px;
        }

        .search-add input {
            flex: 1;
            padding: 12px;
            border-radius: 28px;
            border: none;
            background: #0f3460;
            color: white;
        }

        .search-add button {
            background: #e94560;
            border: none;
            padding: 0 20px;
            border-radius: 28px;
            color: white;
            cursor: pointer;
        }

        .requests-list, .search-results {
            background: #0f3460;
            border-radius: 24px;
            padding: 16px;
        }

        .request-item, .search-result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #533483;
        }

        .request-actions button {
            background: #e94560;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            margin-left: 8px;
            cursor: pointer;
            color: white;
        }

        /* Форма авторизации */
        .auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .auth-card {
            background: #16213e;
            padding: 32px;
            border-radius: 32px;
            width: 360px;
            text-align: center;
        }

        .auth-card input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 28px;
            border: none;
            background: #0f3460;
            color: white;
        }

        .auth-card button {
            background: #e94560;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 28px;
            color: white;
            cursor: pointer;
            margin-top: 10px;
        }

        .switch-auth {
            margin-top: 16px;
            color: #aaa;
            cursor: pointer;
        }

        .error-text {
            color: #ff6b6b;
            font-size: 12px;
        }
    </style>
</head>
<body>
<div id="root"></div>

<script>
    // Глобальное состояние
    let socket = null;
    let currentUser = null;
    let token = null;
    let activeTab = 'chat'; // 'chat' or 'friends'
    let friends = [];        // список друзей { id, username }
    let incomingRequests = []; // { id, fromUser: { id, username } }
    let onlineUsers = [];     // массив { id, username }
    let messages = [];

    // DOM-функции
    function renderAuth() {
        document.getElementById('root').innerHTML = `
            <div class="auth-overlay">
                <div class="auth-card">
                    <h2 style="color:#e94560">🐻 Swolts</h2>
                    <input type="text" id="authUsername" placeholder="Имя пользователя">
                    <input type="password" id="authPassword" placeholder="Пароль">
                    <div id="authError" class="error-text"></div>
                    <button id="authBtn">Войти</button>
                    <div class="switch-auth" id="toggleAuth">Нет аккаунта? Зарегистрироваться</div>
                </div>
            </div>
        `;
        let isLogin = true;
        const authBtn = document.getElementById('authBtn');
        const toggle = document.getElementById('toggleAuth');
        const errorDiv = document.getElementById('authError');

        const handleAuth = async () => {
            const username = document.getElementById('authUsername').value.trim();
            const password = document.getElementById('authPassword').value.trim();
            if (!username || !password) {
                errorDiv.innerText = 'Заполните все поля';
                return;
            }
            const endpoint = isLogin ? '/login' : '/register';
            try {
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error);
                localStorage.setItem('swolts_token', data.token);
                localStorage.setItem('swolts_user', JSON.stringify({ id: data.id, username: data.username }));
                initApp();
            } catch (err) {
                errorDiv.innerText = err.message;
            }
        };
        authBtn.onclick = handleAuth;
        toggle.onclick = () => {
            isLogin = !isLogin;
            authBtn.innerText = isLogin ? 'Войти' : 'Зарегистрироваться';
            toggle.innerHTML = isLogin ? 'Нет аккаунта? Зарегистрироваться' : 'Уже есть аккаунт? Войти';
            errorDiv.innerText = '';
        };
        document.getElementById('authUsername').addEventListener('keypress', (e) => { if(e.key === 'Enter') handleAuth(); });
        document.getElementById('authPassword').addEventListener('keypress', (e) => { if(e.key === 'Enter') handleAuth(); });
    }

    function initApp() {
        token = localStorage.getItem('swolts_token');
        if (!token) { renderAuth(); return; }
        const userData = localStorage.getItem('swolts_user');
        if (!userData) { renderAuth(); return; }
        currentUser = JSON.parse(userData);
        connectSocket();
        loadFriendsData();
        renderMainUI();
    }

    function connectSocket() {
        if (socket) socket.disconnect();
        socket = io({ auth: { token } });
        socket.on('connect', () => console.log('Socket connected'));
        socket.on('messageHistory', (history) => {
            messages = history;
            if (activeTab === 'chat') renderChatMessages();
        });
        socket.on('newMessage', (msg) => {
            messages.push(msg);
            if (activeTab === 'chat') renderChatMessages();
        });
        socket.on('onlineUsers', (users) => {
            onlineUsers = users;
            if (activeTab === 'chat') renderLeftPanel();
            if (activeTab === 'friends') renderFriendsPanel();
        });
        socket.on('friendsList', (data) => {
            friends = data.friends || [];
            incomingRequests = data.incomingRequests || [];
            if (activeTab === 'friends') renderFriendsPanel();
            renderLeftPanel(); // для списка чатов (друзья)
        });
        socket.on('friendRequestReceived', (data) => {
            loadFriendsData();
        });
        socket.on('friendRequestAccepted', (data) => {
            loadFriendsData();
        });
    }

    async function loadFriendsData() {
        try {
            const res = await fetch('/friends/list', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (res.ok) {
                const data = await res.json();
                friends = data.friends || [];
                incomingRequests = data.incomingRequests || [];
                if (activeTab === 'friends') renderFriendsPanel();
                renderLeftPanel();
            }
        } catch(e) {}
    }

    function renderMainUI() {
        document.getElementById('root').innerHTML = `
            <div class="app-window">
                <div class="nav-sidebar">
                    <div class="nav-item ${activeTab === 'chat' ? 'active' : ''}" data-tab="chat">
                        <i class="fas fa-comment-dots"></i>
                    </div>
                    <div class="nav-item ${activeTab === 'friends' ? 'active' : ''}" data-tab="friends">
                        <i class="fas fa-user-friends"></i>
                    </div>
                </div>
                <div class="content-area">
                    <div class="left-panel" id="leftPanel"></div>
                    <div class="right-panel" id="rightPanel"></div>
                </div>
            </div>
        `;
        document.querySelectorAll('.nav-item').forEach(el => {
            el.addEventListener('click', () => {
                activeTab = el.dataset.tab;
                renderMainUI();
            });
        });
        renderLeftPanel();
        if (activeTab === 'chat') renderChatView();
        else renderFriendsView();
    }

    function renderLeftPanel() {
        const leftPanel = document.getElementById('leftPanel');
        if (!leftPanel) return;
        if (activeTab === 'chat') {
            leftPanel.innerHTML = `
                <div class="panel-header">💬 Чаты</div>
                <div class="chats-list">
                    ${friends.map(f => `
                        <div class="chat-item" data-chat-id="${f.id}">
                            <div class="friend-avatar" style="background:#533483">${f.username[0].toUpperCase()}</div>
                            <div class="friend-info">
                                <div class="friend-name">${escapeHtml(f.username)}</div>
                                <div class="online-status">${onlineUsers.some(u => u.id === f.id) ? '🟢 онлайн' : '⚫ офлайн'}</div>
                            </div>
                        </div>
                    `).join('')}
                    ${friends.length === 0 ? '<div style="padding:20px;color:#aaa;">Нет друзей, добавьте в разделе "Друзья"</div>' : ''}
                </div>
            `;
            // TODO: клик по другу — открыть личные сообщения (можно расширить, пока просто общий чат)
        } else {
            leftPanel.innerHTML = `
                <div class="panel-header">👥 Друзья (${friends.length})</div>
                <div class="friends-list">
                    ${friends.map(f => `
                        <div class="friend-item">
                            <div class="friend-avatar" style="background:#e94560">${f.username[0].toUpperCase()}</div>
                            <div class="friend-info">
                                <div class="friend-name">${escapeHtml(f.username)}</div>
                                <div class="online-status">${onlineUsers.some(u => u.id === f.id) ? '🟢 онлайн' : '⚫ офлайн'}</div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }
    }

    function renderChatView() {
        const rightPanel = document.getElementById('rightPanel');
        if (!rightPanel) return;
        rightPanel.innerHTML = `
            <div class="chat-messages" id="chatMessages"></div>
            <div class="input-area">
                <input type="text" id="msgInput" placeholder="Сообщение..." maxlength="500">
                <button id="sendMsgBtn"><i class="fas fa-paper-plane"></i></button>
            </div>
        `;
        renderChatMessages();
        document.getElementById('sendMsgBtn').onclick = () => {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if (text && socket) {
                socket.emit('sendMessage', text);
                input.value = '';
            }
        };
        document.getElementById('msgInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('sendMsgBtn').click();
        });
    }

    function renderChatMessages() {
        const container = document.getElementById('chatMessages');
        if (!container) return;
        container.innerHTML = messages.map(msg => `
            <div class="message-bubble ${msg.userId === currentUser.id ? 'own' : ''}">
                <div class="message-username">${escapeHtml(msg.username)}</div>
                <div>${escapeHtml(msg.text)}</div>
            </div>
        `).join('');
        container.scrollTop = container.scrollHeight;
    }

    async function renderFriendsView() {
        const rightPanel = document.getElementById('rightPanel');
        if (!rightPanel) return;
        // Загружаем актуальные данные
        await loadFriendsData();
        rightPanel.innerHTML = `
            <div class="friends-section">
                <div class="search-add">
                    <input type="text" id="searchUser" placeholder="Поиск пользователей...">
                    <button id="searchBtn"><i class="fas fa-search"></i></button>
                </div>
                <div id="searchResults" class="search-results" style="display:none;"></div>
                <div class="requests-list">
                    <h3 style="color:#e94560">Входящие заявки</h3>
                    <div id="requestsContainer">
                        ${incomingRequests.length === 0 ? '<div style="color:#aaa;">Нет заявок</div>' : ''}
                        ${incomingRequests.map(req => `
                            <div class="request-item" data-request-id="${req.id}">
                                <span>${escapeHtml(req.fromUser.username)}</span>
                                <div class="request-actions">
                                    <button class="accept-request" data-id="${req.id}">✔ Принять</button>
                                    <button class="decline-request" data-id="${req.id}">✖ Отклонить</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
                <div class="friends-list-full">
                    <h3 style="color:#e94560">Мои друзья (${friends.length})</h3>
                    <div id="myFriendsList">
                        ${friends.map(f => `<div class="friend-item"><div class="friend-avatar">${f.username[0]}</div><div class="friend-name">${escapeHtml(f.username)}</div></div>`).join('')}
                    </div>
                </div>
            </div>
        `;
        // Обработка кнопок заявок
        document.querySelectorAll('.accept-request').forEach(btn => {
            btn.onclick = async () => {
                const reqId = parseInt(btn.dataset.id);
                await fetch('/friends/accept', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ requestId: reqId })
                });
                loadFriendsData();
                renderFriendsView();
            };
        });
        document.querySelectorAll('.decline-request').forEach(btn => {
            btn.onclick = async () => {
                const reqId = parseInt(btn.dataset.id);
                await fetch('/friends/decline', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ requestId: reqId })
                });
                loadFriendsData();
                renderFriendsView();
            };
        });
        // Поиск
        const searchBtn = document.getElementById('searchBtn');
        const searchInput = document.getElementById('searchUser');
        searchBtn.onclick = async () => {
            const query = searchInput.value.trim();
            if (query.length < 2) return;
            const res = await fetch(`/users/search?q=${encodeURIComponent(query)}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (res.ok) {
                const usersList = await res.json();
                const resultsDiv = document.getElementById('searchResults');
                if (usersList.length === 0) {
                    resultsDiv.innerHTML = '<div style="padding:10px;">Никого не найдено</div>';
                } else {
                    resultsDiv.innerHTML = usersList.map(u => `
                        <div class="search-result-item">
                            <span>${escapeHtml(u.username)}</span>
                            <button class="add-friend-btn" data-id="${u.id}">➕ Добавить</button>
                        </div>
                    `).join('');
                }
                resultsDiv.style.display = 'block';
                document.querySelectorAll('.add-friend-btn').forEach(btn => {
                    btn.onclick = async () => {
                        const toUserId = parseInt(btn.dataset.id);
                        await fetch('/friends/request', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                            body: JSON.stringify({ toUserId })
                        });
                        alert('Заявка отправлена');
                        searchInput.value = '';
                        resultsDiv.style.display = 'none';
                    };
                });
            }
        };
    }

    function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    // Запуск
    if (localStorage.getItem('swolts_token')) {
        initApp();
    } else {
        renderAuth();
    }
</script>
</body>
</html>
