<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Kinders · мягкий чат</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #eef2f5;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        /* главный контейнер — никаких сдвигов */
        .app-wrapper {
            width: 100%;
            max-width: 1000px;
            height: 90vh;
            min-height: 500px;
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* панель входа */
        .auth-panel {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #ffffff;
        }

        .auth-card {
            background: #f9fbfd;
            border-radius: 28px;
            padding: 32px 28px;
            width: 100%;
            max-width: 420px;
            border: 1px solid #e6edf2;
        }

        .auth-card h3 {
            font-size: 26px;
            font-weight: 600;
            color: #1e2f3f;
            margin-bottom: 8px;
        }

        .auth-card p {
            color: #5c6f82;
            margin-bottom: 28px;
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            font-size: 13px;
            font-weight: 500;
            color: #2c3e50;
            margin-bottom: 6px;
            display: block;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 30px;
            border: 1.5px solid #dee6ed;
            background: white;
            font-size: 15px;
        }

        .input-group input:focus {
            outline: none;
            border-color: #8d9eae;
        }

        .auth-buttons {
            display: flex;
            gap: 12px;
            margin-top: 10px;
        }

        .btn-primary {
            background: #2c3e50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            flex: 1;
            transition: 0.2s;
        }

        .btn-primary:hover { background: #1f2f3e; }

        .btn-secondary {
            background: #eef2f6;
            color: #2c3e50;
            border: 1px solid #d4dfea;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            flex: 1;
        }

        .error-msg {
            color: #c0392b;
            background: #fee9e7;
            padding: 10px;
            border-radius: 24px;
            font-size: 13px;
            text-align: center;
            margin-top: 16px;
        }

        /* Чат-интерфейс */
        .chat-interface {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .chat-header {
            padding: 18px 24px;
            border-bottom: 1px solid #eef2f8;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .brand h2 {
            font-size: 1.45rem;
            font-weight: 600;
            color: #2c3e50;
        }

        .user-panel {
            display: flex;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
        }

        .username-badge {
            background: #eff3f8;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            color: #1e2f3f;
        }

        .online-count {
            background: #e1f0e8;
            color: #2c6e4f;
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 13px;
        }

        .logout-btn {
            background: none;
            border: 1px solid #d4dfea;
            padding: 6px 16px;
            border-radius: 30px;
            color: #5b6f82;
            cursor: pointer;
            transition: 0.2s;
        }

        .logout-btn:hover {
            background: #fef2f0;
            border-color: #d9b4ae;
            color: #b33c2e;
        }

        /* область сообщений — стабильный скролл */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #fdfdfd;
        }

        .message {
            max-width: 75%;
            padding: 10px 16px;
            border-radius: 24px;
            word-wrap: break-word;
            font-size: 14px;
            line-height: 1.4;
        }

        .message.own {
            background: #e2eaf1;
            color: #1a2c3e;
            align-self: flex-end;
            border-bottom-right-radius: 6px;
        }

        .message.other {
            background: #f1f5f9;
            border: 1px solid #e9edf2;
            align-self: flex-start;
            border-bottom-left-radius: 6px;
        }

        .message-username {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 4px;
            opacity: 0.75;
        }

        .system-message {
            text-align: center;
            font-size: 12px;
            color: #7c8b9c;
            background: #f4f7fb;
            padding: 6px 12px;
            border-radius: 40px;
            width: fit-content;
            align-self: center;
            margin: 4px 0;
        }

        .input-bar {
            flex-shrink: 0;
            padding: 18px 24px 24px;
            border-top: 1px solid #edf2f7;
            display: flex;
            gap: 12px;
            background: white;
        }

        .input-bar input {
            flex: 1;
            padding: 14px 18px;
            border-radius: 44px;
            border: 1px solid #dee6ed;
            font-size: 15px;
        }

        .input-bar input:focus {
            outline: none;
            border-color: #90a4b7;
        }

        .input-bar button {
            background: #2c3e50;
            border: none;
            padding: 12px 28px;
            border-radius: 44px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        .hidden { display: none !important; }

        @media (max-width: 640px) {
            .message { max-width: 85%; }
            .user-panel { gap: 8px; }
            .input-bar { padding: 12px 16px 18px; }
        }
    </style>
</head>
<body>
<div class="app-wrapper" id="appWrapper">
    <!-- форма входа/регистрации -->
    <div id="authContainer" class="auth-panel">
        <div class="auth-card">
            <h3>🐻 добро пожаловать</h3>
            <p>Kinders — пространство для живого общения</p>
            <div id="authError" class="error-msg hidden"></div>
            <div class="input-group">
                <label>Имя пользователя</label>
                <input type="text" id="loginUsername" placeholder="например, ann_light">
            </div>
            <div class="input-group">
                <label>Пароль</label>
                <input type="password" id="loginPassword" placeholder="••••••">
            </div>
            <div class="auth-buttons">
                <button class="btn-primary" id="doLoginBtn">Войти</button>
                <button class="btn-secondary" id="showRegisterBtn">Создать аккаунт</button>
            </div>
            <div id="registerForm" class="hidden" style="margin-top: 24px;">
                <div class="input-group">
                    <label>Новый логин</label>
                    <input type="text" id="regUsername" placeholder="от 3 символов">
                </div>
                <div class="input-group">
                    <label>Пароль</label>
                    <input type="password" id="regPassword" placeholder="минимум 4 символа">
                </div>
                <div class="auth-buttons">
                    <button class="btn-primary" id="doRegisterBtn">Зарегистрироваться</button>
                    <button class="btn-secondary" id="backToLoginBtn">Назад</button>
                </div>
            </div>
        </div>
    </div>

    <!-- чат (изначально скрыт) -->
    <div id="chatInterface" class="chat-interface hidden">
        <div class="chat-header">
            <div class="brand"><span style="font-size:26px;">🍃</span><h2>Kinders · мягкий чат</h2></div>
            <div class="user-panel">
                <span class="username-badge" id="chatUsername">—</span>
                <span class="online-count" id="onlineUsersBadge">👥 0 онлайн</span>
                <button class="logout-btn" id="chatLogoutBtn">Выйти</button>
            </div>
        </div>
        <div class="messages-area" id="messagesList">
            <div class="system-message">✨ Соединение с чатом...</div>
        </div>
        <div class="input-bar">
            <input type="text" id="chatMessageInput" placeholder="Напишите сообщение..." maxlength="500">
            <button id="sendMessageBtn">Отправить</button>
        </div>
    </div>
</div>

<script>
    // ---------- работа с куками ----------
    function setCookie(name, value, days = 7) {
        const expires = new Date(Date.now() + days * 864e5).toUTCString();
        document.cookie = `${name}=${value}; path=/; expires=${expires}; SameSite=Lax`;
    }
    function getCookie(name) {
        const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
        return match ? match[2] : null;
    }
    function deleteCookie(name) { document.cookie = `${name}=; path=/; expires=Thu, 01 Jan 1970 00:00:00 UTC;`; }

    // парсинг JWT
    function parseJwt(token) {
        try {
            const base64 = token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
            return JSON.parse(atob(base64));
        } catch { return null; }
    }

    let currentSocket = null;
    let currentUser = null;

    // DOM-элементы
    const authDiv = document.getElementById('authContainer');
    const chatDiv = document.getElementById('chatInterface');
    const messagesBox = document.getElementById('messagesList');
    const errorDiv = document.getElementById('authError');

    // вспомогательные UI
    function showAuthError(msg) { errorDiv.textContent = msg; errorDiv.classList.remove('hidden'); setTimeout(() => errorDiv.classList.add('hidden'), 3000); }
    function addSystemMessage(text) {
        const sys = document.createElement('div'); sys.className = 'system-message'; sys.textContent = text;
        messagesBox.appendChild(sys); messagesBox.scrollTop = messagesBox.scrollHeight;
        setTimeout(() => sys.remove(), 4000);
    }
    function addMessageToChat(msg, isOwn) {
        const div = document.createElement('div'); div.className = `message ${isOwn ? 'own' : 'other'}`;
        div.innerHTML = `<div class="message-username">${escapeHtml(msg.username)}</div><div>${escapeHtml(msg.text)}</div>`;
        messagesBox.appendChild(div); messagesBox.scrollTop = messagesBox.scrollHeight;
    }
    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    // очистка и переключение на форму входа
    function logoutAndReset() {
        if (currentSocket) { currentSocket.disconnect(); currentSocket = null; }
        deleteCookie('swolts_token');
        currentUser = null;
        chatDiv.classList.add('hidden');
        authDiv.classList.remove('hidden');
        document.getElementById('loginUsername').value = '';
        document.getElementById('loginPassword').value = '';
        document.getElementById('regUsername').value = '';
        document.getElementById('regPassword').value = '';
        document.getElementById('registerForm').classList.add('hidden');
        document.getElementById('doLoginBtn').parentElement.style.display = 'flex';
        document.getElementById('showRegisterBtn').style.display = 'block';
    }

    // запуск чата после успешной аутентификации (токен уже в куке)
    function startChatWithToken(token, userPayload) {
        if (!token || !userPayload) { logoutAndReset(); return false; }
        currentUser = { id: userPayload.id, username: userPayload.username };
        authDiv.classList.add('hidden');
        chatDiv.classList.remove('hidden');
        document.getElementById('chatUsername').innerText = currentUser.username;
        messagesBox.innerHTML = '<div class="system-message">🔄 Загрузка истории...</div>';

        // подключаем Socket.IO с токеном из куки
        currentSocket = io({ auth: { token } });
        currentSocket.on('connect', () => addSystemMessage('✅ Подключено к серверу'));
        currentSocket.on('messageHistory', (history) => {
            messagesBox.innerHTML = '';
            if (!history.length) addSystemMessage('🍃 Пока нет сообщений. Напишите первое!');
            history.forEach(msg => addMessageToChat(msg, msg.userId === currentUser.id));
        });
        currentSocket.on('newMessage', (msg) => addMessageToChat(msg, msg.userId === currentUser.id));
        currentSocket.on('onlineUsers', (users) => document.getElementById('onlineUsersBadge').innerHTML = `👥 ${users.length} онлайн`);
        currentSocket.on('user_joined', (data) => addSystemMessage(`✨ ${data.username} присоединился`));
        currentSocket.on('user_left', (data) => addSystemMessage(`🍂 ${data.username} покинул чат`));
        currentSocket.on('connect_error', (err) => { addSystemMessage('⚠️ Ошибка соединения'); if(err.message === 'Authentication error') logoutAndReset(); });
        return true;
    }

    // API-запросы к серверу
    async function apiRequest(url, data) {
        const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
        const json = await res.json();
        if (!res.ok) throw new Error(json.message || 'Ошибка');
        return json;
    }

    async function handleLogin() {
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value;
        if (!username || !password) return showAuthError('Заполните все поля');
        try {
            const data = await apiRequest('/api/login', { username, password });
            setCookie('swolts_token', data.token, 7);
            const payload = parseJwt(data.token);
            startChatWithToken(data.token, payload || { id: data.userId, username: data.username });
        } catch(e) { showAuthError(e.message); }
    }

    async function handleRegister() {
        const username = document.getElementById('regUsername').value.trim();
        const password = document.getElementById('regPassword').value;
        if (username.length < 3) return showAuthError('Логин минимум 3 символа');
        if (password.length < 4) return showAuthError('Пароль минимум 4 символа');
        try {
            const data = await apiRequest('/api/register', { username, password });
            setCookie('swolts_token', data.token, 7);
            const payload = parseJwt(data.token);
            startChatWithToken(data.token, payload || { id: data.userId, username: data.username });
        } catch(e) { showAuthError(e.message); }
    }

    // обработчики UI
    document.getElementById('doLoginBtn').onclick = handleLogin;
    document.getElementById('showRegisterBtn').onclick = () => {
        document.getElementById('registerForm').classList.remove('hidden');
        document.getElementById('doLoginBtn').parentElement.style.display = 'none';
        document.getElementById('showRegisterBtn').style.display = 'none';
    };
    document.getElementById('backToLoginBtn').onclick = () => {
        document.getElementById('registerForm').classList.add('hidden');
        document.getElementById('doLoginBtn').parentElement.style.display = 'flex';
        document.getElementById('showRegisterBtn').style.display = 'block';
    };
    document.getElementById('doRegisterBtn').onclick = handleRegister;
    document.getElementById('chatLogoutBtn').onclick = logoutAndReset;
    document.getElementById('sendMessageBtn').onclick = () => { if(currentSocket && currentUser) currentSocket.emit('sendMessage', document.getElementById('chatMessageInput').value.trim()); document.getElementById('chatMessageInput').value = ''; };
    document.getElementById('chatMessageInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') document.getElementById('sendMessageBtn').click(); });

    // автовход по куке при загрузке
    const tokenFromCookie = getCookie('swolts_token');
    if (tokenFromCookie) {
        const payload = parseJwt(tokenFromCookie);
        if (payload && payload.username) startChatWithToken(tokenFromCookie, payload);
        else logoutAndReset();
    } else { logoutAndReset(); }
</script>
</body>
</html>
