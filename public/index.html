<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swolts — Чат</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui;
            background: linear-gradient(135deg, #0a0a1a 0%, #151530 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            background: rgba(20, 22, 40, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            overflow: hidden;
        }
        /* Форма входа */
        .auth-form {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            gap: 20px;
            padding: 20px;
        }
        .auth-form h2 { color: #7c83ff; margin-bottom: 10px; }
        .auth-form input {
            width: 80%;
            padding: 12px;
            border-radius: 24px;
            border: none;
            background: #1a1a3e;
            color: white;
            font-size: 16px;
        }
        .auth-form button {
            padding: 12px 30px;
            border-radius: 24px;
            border: none;
            background: #7c83ff;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
        }
        .auth-form .switch {
            color: #aaa;
            font-size: 14px;
            cursor: pointer;
        }
        .auth-form .switch span { color: #7c83ff; text-decoration: underline; }
        .error-msg { color: #ff6b6b; font-size: 14px; margin-top: 10px; }

        /* Чат (изначально скрыт) */
        .chat-container {
            display: none;
            flex-direction: column;
            height: 100%;
        }
        .chat-header {
            padding: 20px;
            border-bottom: 1px solid #2a2f4a;
            color: #7c83ff;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .message {
            padding: 10px 15px;
            border-radius: 18px;
            max-width: 70%;
            word-wrap: break-word;
        }
        .message.own {
            background: #7c83ff;
            color: white;
            align-self: flex-end;
        }
        .message.other {
            background: #2a2f4a;
            color: white;
            align-self: flex-start;
        }
        .message-username {
            font-size: 12px;
            opacity: 0.8;
            margin-bottom: 4px;
        }
        .input-area {
            padding: 20px;
            border-top: 1px solid #2a2f4a;
            display: flex;
            gap: 10px;
        }
        .input-area input {
            flex: 1;
            padding: 12px;
            border-radius: 24px;
            border: none;
            background: #1a1a3e;
            color: white;
        }
        .input-area input:focus { outline: none; }
        .input-area button {
            padding: 12px 24px;
            border-radius: 24px;
            border: none;
            background: #7c83ff;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .logout-btn {
            background: none;
            border: 1px solid #ff6b6b;
            color: #ff6b6b;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
        }
        .online-users { color: #4ade80; font-size: 14px; margin-left: 12px; }
    </style>
</head>
<body>
<div class="container">
    <!-- Форма входа/регистрации -->
    <div id="authPanel" class="auth-form">
        <h2>🐻 Swolts</h2>
        <input type="text" id="authUsername" placeholder="Имя пользователя">
        <input type="password" id="authPassword" placeholder="Пароль">
        <button id="authBtn">Войти</button>
        <div class="switch" id="toggleAuth">Нет аккаунта? <span>Зарегистрироваться</span></div>
        <div id="authError" class="error-msg"></div>
    </div>

    <!-- Чат (скрыт до авторизации) -->
    <div id="chatPanel" class="chat-container">
        <div class="chat-header">
            <h2>🐻 Swolts Chat</h2>
            <div>
                <span id="username"></span>
                <span class="online-users" id="onlineCount">0 онлайн</span>
                <button class="logout-btn" id="logoutBtn">Выйти</button>
            </div>
        </div>
        <div class="messages" id="messages"></div>
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Введите сообщение..." maxlength="500">
            <button id="sendBtn">Отправить</button>
        </div>
    </div>
</div>

<script>
    // ----- Глобальные переменные -----
    let socket = null;
    let currentUser = null;

    // DOM элементы
    const authPanel = document.getElementById('authPanel');
    const chatPanel = document.getElementById('chatPanel');
    const authUsername = document.getElementById('authUsername');
    const authPassword = document.getElementById('authPassword');
    const authBtn = document.getElementById('authBtn');
    const toggleAuth = document.getElementById('toggleAuth');
    const authError = document.getElementById('authError');
    const logoutBtn = document.getElementById('logoutBtn');
    const usernameSpan = document.getElementById('username');
    const messagesDiv = document.getElementById('messages');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const onlineCountSpan = document.getElementById('onlineCount');

    let isLoginMode = true;  // true = вход, false = регистрация

    // Переключение режима
    toggleAuth.addEventListener('click', () => {
        isLoginMode = !isLoginMode;
        if (isLoginMode) {
            authBtn.textContent = 'Войти';
            toggleAuth.innerHTML = 'Нет аккаунта? <span>Зарегистрироваться</span>';
        } else {
            authBtn.textContent = 'Зарегистрироваться';
            toggleAuth.innerHTML = 'Уже есть аккаунт? <span>Войти</span>';
        }
        authError.textContent = '';
    });

    // Авторизация (логин / регистрация)
    async function handleAuth() {
        const username = authUsername.value.trim();
        const password = authPassword.value.trim();
        if (!username || !password) {
            authError.textContent = 'Заполните все поля';
            return;
        }

        const endpoint = isLoginMode ? '/login' : '/register';
        try {
            const res = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'Ошибка');
            // Успех: сохраняем токен и переключаемся в чат
            localStorage.setItem('swolts_token', data.token);
            localStorage.setItem('swolts_user', JSON.stringify({ id: data.id, username: data.username }));
            initChat();
        } catch (err) {
            authError.textContent = err.message;
        }
    }

    authBtn.onclick = handleAuth;
    // Enter в полях формы
    authUsername.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleAuth(); });
    authPassword.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleAuth(); });

    // Инициализация чата после успешного логина
    function initChat() {
        const token = localStorage.getItem('swolts_token');
        if (!token) return;
        const user = JSON.parse(localStorage.getItem('swolts_user'));
        currentUser = user;
        usernameSpan.textContent = user.username;

        // Скрываем форму, показываем чат
        authPanel.style.display = 'none';
        chatPanel.style.display = 'flex';

        // Подключаем socket с токеном
        if (socket) socket.disconnect();
        socket = io({ auth: { token } });

        socket.on('connect', () => console.log('✅ Подключен к чату'));

        socket.on('messageHistory', (history) => {
            messagesDiv.innerHTML = '';
            history.forEach(msg => addMessage(msg, msg.userId === currentUser.id));
        });

        socket.on('newMessage', (msg) => addMessage(msg, msg.userId === currentUser.id));

        socket.on('onlineUsers', (users) => {
            onlineCountSpan.textContent = `${users.length} онлайн`;
        });

        socket.on('connect_error', (err) => {
            console.error('Ошибка сокета:', err);
            alert('Не удалось подключиться к серверу. Проверьте, запущен ли сервер.');
            logout();
        });

        // Отправка сообщения
        sendBtn.onclick = () => {
            const text = messageInput.value.trim();
            if (text) {
                socket.emit('sendMessage', text);
                messageInput.value = '';
            }
        };
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendBtn.click();
        });
    }

    function addMessage(msg, isOwn) {
        const div = document.createElement('div');
        div.className = `message ${isOwn ? 'own' : 'other'}`;
        div.innerHTML = `<div class="message-username">${escapeHtml(msg.username)}</div><div>${escapeHtml(msg.text)}</div>`;
        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    function logout() {
        if (socket) socket.disconnect();
        localStorage.removeItem('swolts_token');
        localStorage.removeItem('swolts_user');
        currentUser = null;
        authPanel.style.display = 'flex';
        chatPanel.style.display = 'none';
        authUsername.value = '';
        authPassword.value = '';
        authError.textContent = '';
        isLoginMode = true;
        authBtn.textContent = 'Войти';
        toggleAuth.innerHTML = 'Нет аккаунта? <span>Зарегистрироваться</span>';
    }

    logoutBtn.onclick = logout;

    // Проверяем, есть ли уже сохранённый токен при загрузке
    (function checkExistingToken() {
        const token = localStorage.getItem('swolts_token');
        const user = localStorage.getItem('swolts_user');
        if (token && user) {
            initChat();
        } else {
            authPanel.style.display = 'flex';
            chatPanel.style.display = 'none';
        }
    })();
</script>
</body>
</html>
