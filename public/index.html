<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swolts — Вход и Регистрация</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0a0015 0%, #150025 50%, #1a0030 100%);
            position: relative;
            overflow: hidden;
        }

        /* Анимированный кислотный фон */
        .animated-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 255, 136, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(255, 0, 212, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(0, 238, 255, 0.05) 0%, transparent 70%);
            animation: pulse 8s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }

        .auth-container {
            background: rgba(20, 5, 35, 0.9);
            backdrop-filter: blur(15px);
            border-radius: 48px;
            padding: 40px;
            width: 100%;
            max-width: 460px;
            box-shadow: 
                0 25px 50px rgba(0, 0, 0, 0.6),
                0 0 0 1px rgba(0, 255, 136, 0.3),
                0 0 30px rgba(0, 255, 136, 0.1);
        }

        h1 {
            color: #00ff88;
            text-align: center;
            margin-bottom: 8px;
            font-size: 48px;
            font-weight: 800;
            text-shadow: 0 0 30px rgba(0, 255, 136, 0.5);
            letter-spacing: -1px;
        }

        .subtitle {
            text-align: center;
            color: #b0a0c0;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            background: rgba(0, 0, 0, 0.4);
            padding: 6px;
            border-radius: 40px;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 12px;
            border-radius: 40px;
            color: #c0b0d0;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
            border: none;
            background: transparent;
            font-size: 16px;
        }

        .tab:hover {
            color: #00ff88;
            background: rgba(0, 255, 136, 0.1);
        }

        .tab.active {
            background: linear-gradient(135deg, #00ff88, #00ccff);
            color: #0a0015;
            font-weight: bold;
            box-shadow: 0 4px 20px rgba(0, 255, 136, 0.4);
        }

        input {
            width: 100%;
            padding: 14px 18px;
            margin: 10px 0;
            background: rgba(30, 10, 50, 0.8);
            border: 1px solid #3a2050;
            border-radius: 32px;
            color: #ffffff;
            font-size: 16px;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #00ff88;
            box-shadow: 0 0 0 3px rgba(0, 255, 136, 0.2), 0 0 20px rgba(0, 255, 136, 0.1);
            background: rgba(30, 10, 50, 1);
        }

        input::placeholder { 
            color: #806090; 
        }

        /* Капча */
        .captcha-container {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 32px;
            padding: 16px;
            margin: 16px 0;
            border: 1px solid rgba(0, 255, 136, 0.3);
        }

        .captcha-word {
            text-align: center;
            font-size: 32px;
            font-weight: bold;
            letter-spacing: 12px;
            background: rgba(30, 10, 50, 0.9);
            padding: 12px;
            border-radius: 20px;
            margin-bottom: 12px;
            color: #00ff88;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }

        .captcha-refresh {
            background: none;
            border: 1px solid #00ff88;
            color: #00ff88;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            margin-top: 8px;
            transition: 0.2s;
        }

        .captcha-refresh:hover {
            background: rgba(0, 255, 136, 0.15);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.3);
        }

        /* Чекбокс */
        .remember-row {
            display: flex;
            align-items: center;
            margin: 16px 0;
            color: #c0b0d0;
        }

        .remember-row input {
            width: auto;
            margin-right: 10px;
            accent-color: #00ff88;
        }

        /* Кнопки */
        button[type="submit"],
        .verify-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00ff88, #00ccff);
            border: none;
            border-radius: 32px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            color: #0a0015;
            transition: all 0.3s;
            margin-top: 16px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 255, 136, 0.3);
        }

        button[type="submit"]:hover,
        .verify-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 255, 136, 0.5);
        }

        button[type="submit"]:active,
        .verify-btn:active {
            transform: translateY(0);
        }

        /* Секции форм */
        .form-section { 
            display: none; 
        }

        .form-section.active { 
            display: block; 
        }

        /* Сообщения */
        .error {
            color: #ff4488;
            text-align: center;
            margin-top: 16px;
            font-size: 14px;
            background: rgba(255, 68, 136, 0.1);
            padding: 8px;
            border-radius: 20px;
            border-left: 3px solid #ff4488;
        }

        .success {
            color: #00ff88;
            text-align: center;
            margin-top: 16px;
            font-size: 14px;
            background: rgba(0, 255, 136, 0.1);
            padding: 8px;
            border-radius: 20px;
            border-left: 3px solid #00ff88;
        }

        /* Верификация */
        .verification-container {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 32px;
            padding: 20px;
            margin: 16px 0;
            border: 1px solid rgba(0, 255, 136, 0.3);
            text-align: center;
        }

        .verification-container p { 
            color: #c0b0d0; 
            margin-bottom: 15px; 
        }

        .email-display { 
            color: #00ff88; 
            font-weight: bold; 
            text-shadow: 0 0 5px rgba(0, 255, 136, 0.5);
        }

        .code-inputs {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin: 15px 0;
        }

        .code-inputs input {
            width: 45px;
            height: 55px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            padding: 0;
            margin: 0;
            border-color: #00ff88;
        }

        .timer { 
            color: #ffcc00; 
            font-size: 14px; 
            margin: 10px 0; 
        }

        .resend-btn {
            background: none;
            border: 1px solid #00ccff;
            color: #00ccff;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            margin-top: 5px;
            transition: 0.2s;
        }

        .resend-btn:hover:not(:disabled) {
            background: rgba(0, 204, 255, 0.15);
            box-shadow: 0 0 15px rgba(0, 204, 255, 0.3);
        }

        .resend-btn:disabled { 
            opacity: 0.4; 
            cursor: not-allowed; 
        }

        .back-btn {
            background: none;
            border: none;
            color: #c0b0d0;
            cursor: pointer;
            font-size: 14px;
            margin-top: 10px;
            text-decoration: underline;
        }

        .back-btn:hover {
            color: #00ff88;
        }

        /* Анимация исчезновения */
        .fade-out {
            animation: fadeOut 0.5s forwards;
        }

        @keyframes fadeOut {
            to { 
                opacity: 0; 
                transform: scale(0.9); 
                visibility: hidden; 
            }
        }
    </style>
</head>
<body>
<div class="animated-bg"></div>

<div class="auth-container" id="authContainer">
    <h1>⚡ Swolts</h1>
    <div class="subtitle">Кислотное будущее</div>

    <div class="tabs">
        <button type="button" class="tab active" id="loginTab">Вход</button>
        <button type="button" class="tab" id="registerTab">Регистрация</button>
    </div>

    <!-- Форма ВХОДА -->
    <div class="form-section active" id="loginSection">
        <form id="loginForm">
            <input type="text" id="loginUsername" placeholder="Никнейм или Email" required autocomplete="username">
            <input type="password" id="loginPassword" placeholder="Пароль" required autocomplete="current-password">
            <div class="remember-row">
                <input type="checkbox" id="remember">
                <label for="remember">Запомнить меня</label>
            </div>
            <button type="submit">Войти →</button>
        </form>
    </div>

    <!-- Форма РЕГИСТРАЦИИ -->
    <div class="form-section" id="registerSection">
        <form id="registerForm">
            <input type="text" id="regUsername" placeholder="Никнейм" required autocomplete="username">
            <input type="email" id="regEmail" placeholder="Email" required autocomplete="email">
            <input type="password" id="regPassword" placeholder="Пароль (мин. 4 символа)" required autocomplete="new-password">
            <input type="password" id="regConfirm" placeholder="Подтвердите пароль" required autocomplete="off">
            
            <div class="captcha-container">
                <div class="captcha-word" id="captchaWord"></div>
                <input type="text" id="captchaInput" placeholder="Введите слово с картинки" autocomplete="off">
                <div style="text-align: center;">
                    <button type="button" class="captcha-refresh" id="refreshCaptcha">🔄 Обновить</button>
                </div>
            </div>
            
            <button type="submit">Продолжить →</button>
        </form>
    </div>

    <!-- Форма ПОДТВЕРЖДЕНИЯ КОДА -->
    <div class="form-section" id="verifySection">
        <div class="verification-container">
            <p>Код отправлен на <span class="email-display" id="displayEmail"></span></p>
            <div class="code-inputs" id="codeInputs">
                <input type="text" maxlength="1" class="code-digit" data-index="0" inputmode="numeric">
                <input type="text" maxlength="1" class="code-digit" data-index="1" inputmode="numeric">
                <input type="text" maxlength="1" class="code-digit" data-index="2" inputmode="numeric">
                <input type="text" maxlength="1" class="code-digit" data-index="3" inputmode="numeric">
                <input type="text" maxlength="1" class="code-digit" data-index="4" inputmode="numeric">
                <input type="text" maxlength="1" class="code-digit" data-index="5" inputmode="numeric">
            </div>
            <div class="timer" id="timer">02:00</div>
            <button type="button" class="resend-btn" id="resendBtn" disabled>Отправить код повторно</button>
            <button type="button" class="back-btn" id="backToRegisterBtn">← Изменить данные</button>
        </div>
        <button type="button" class="verify-btn" id="verifyCodeBtn">Подтвердить и создать аккаунт</button>
    </div>

    <div id="errorMsg" class="error"></div>
    <div id="successMsg" class="success"></div>
</div>

<script>
    const API_URL = window.location.origin;

    // Сохранение токена
    function setAuthToken(token) {
        localStorage.setItem('swolts_token', token);
    }

    // Глобальные переменные
    const loginTab = document.getElementById('loginTab');
    const registerTab = document.getElementById('registerTab');
    const loginSection = document.getElementById('loginSection');
    const registerSection = document.getElementById('registerSection');
    const verifySection = document.getElementById('verifySection');
    const errorMsg = document.getElementById('errorMsg');
    const successMsg = document.getElementById('successMsg');

    let pendingRegistration = { username: '', email: '', password: '' };
    let timerInterval, timeLeft = 120, canResend = false;

    // Переключение вкладок
    loginTab.addEventListener('click', () => {
        loginTab.classList.add('active');
        registerTab.classList.remove('active');
        loginSection.classList.add('active');
        registerSection.classList.remove('active');
        verifySection.classList.remove('active');
        errorMsg.innerText = '';
        successMsg.innerText = '';
    });

    registerTab.addEventListener('click', () => {
        registerTab.classList.add('active');
        loginTab.classList.remove('active');
        registerSection.classList.add('active');
        loginSection.classList.remove('active');
        verifySection.classList.remove('active');
        errorMsg.innerText = '';
        successMsg.innerText = '';
        refreshCaptcha();
    });

    // Капча
    const goodWords = ["ДОБРО", "МИР", "СОЛНЦЕ", "СВЕТ", "РАДОСТЬ", "СЧАСТЬЕ", "УЛЫБКА", "ДРУЖБА", "ВЕСНА", "ЦВЕТЫ", "МЕЧТА", "ЗВЕЗДА", "КИСЛОТА", "НЕОН", "ЛАЗЕР"];
    let currentCaptchaWord = '';

    function refreshCaptcha() {
        currentCaptchaWord = goodWords[Math.floor(Math.random() * goodWords.length)];
        document.getElementById('captchaWord').innerText = currentCaptchaWord;
        document.getElementById('captchaInput').value = '';
    }
    refreshCaptcha();
    
    document.getElementById('refreshCaptcha').addEventListener('click', refreshCaptcha);

    function checkCaptcha() {
        return document.getElementById('captchaInput').value.trim().toUpperCase() === currentCaptchaWord;
    }

    // Таймер
    function startTimer() {
        clearInterval(timerInterval);
        timeLeft = 120;
        canResend = false;
        const resendBtn = document.getElementById('resendBtn');
        resendBtn.disabled = true;
        
        timerInterval = setInterval(() => {
            timeLeft--;
            const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
            const s = (timeLeft % 60).toString().padStart(2, '0');
            document.getElementById('timer').innerText = `${m}:${s}`;
            
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                document.getElementById('timer').innerText = '00:00';
                canResend = true;
                resendBtn.disabled = false;
            }
        }, 1000);
    }

    // Автопереход в полях кода
    const codeInputs = document.querySelectorAll('.code-digit');
    codeInputs.forEach((input, i) => {
        input.addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/\D/g, ''); // Только цифры
            if (e.target.value.length === 1 && i < 5) {
                codeInputs[i + 1].focus();
            }
        });
        
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace' && i > 0 && !e.target.value) {
                codeInputs[i - 1].focus();
            }
        });
    });

    // Вход
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value;

        errorMsg.innerText = '';
        successMsg.innerText = '';
        
        if (!username || !password) {
            errorMsg.innerText = '❌ Заполните все поля';
            return;
        }

        try {
            const res = await fetch(`${API_URL}/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            
            if (data.success) {
                setAuthToken(data.token);
                successMsg.innerText = '✅ Вход выполнен!';
                document.getElementById('authContainer').classList.add('fade-out');
                setTimeout(() => window.location.href = '/chat.html', 500);
            } else {
                errorMsg.innerText = '❌ ' + data.error;
            }
        } catch (err) {
            errorMsg.innerText = '❌ Ошибка соединения с сервером';
        }
    });

    // Регистрация шаг 1
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('regUsername').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPassword').value;
        const confirm = document.getElementById('regConfirm').value;

        errorMsg.innerText = '';
        successMsg.innerText = '';
        
        if (!username || !email || !password || !confirm) {
            errorMsg.innerText = '❌ Заполните все поля';
            return;
        }
        if (password !== confirm) {
            errorMsg.innerText = '❌ Пароли не совпадают';
            return;
        }
        if (password.length < 4) {
            errorMsg.innerText = '❌ Пароль минимум 4 символа';
            return;
        }
        if (!checkCaptcha()) {
            refreshCaptcha();
            errorMsg.innerText = '❌ Неверная капча';
            return;
        }

        pendingRegistration = { username, email, password };

        try {
            const res = await fetch(`${API_URL}/register/step1`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, email, password })
            });
            const data = await res.json();
            
            if (data.success) {
                registerSection.classList.remove('active');
                verifySection.classList.add('active');
                document.getElementById('displayEmail').innerText = email;
                startTimer();
                codeInputs.forEach(i => i.value = '');
                codeInputs[0].focus();
                successMsg.innerText = '📧 Код отправлен на email';
            } else {
                errorMsg.innerText = '❌ ' + data.error;
            }
        } catch (err) {
            errorMsg.innerText = '❌ Ошибка соединения с сервером';
        }
    });

    // Подтверждение кода
    document.getElementById('verifyCodeBtn').addEventListener('click', async () => {
        const code = Array.from(codeInputs).map(i => i.value).join('');
        
        errorMsg.innerText = '';
        successMsg.innerText = '';
        
        if (code.length !== 6) {
            errorMsg.innerText = '❌ Введите 6 цифр';
            return;
        }

        try {
            const res = await fetch(`${API_URL}/register/verify`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: pendingRegistration.email, code })
            });
            const data = await res.json();
            
            if (data.success) {
                setAuthToken(data.token);
                clearInterval(timerInterval);
                successMsg.innerText = '✅ Аккаунт создан!';
                document.getElementById('authContainer').classList.add('fade-out');
                setTimeout(() => window.location.href = '/chat.html', 500);
            } else {
                errorMsg.innerText = '❌ ' + data.error;
            }
        } catch (err) {
            errorMsg.innerText = '❌ Ошибка соединения с сервером';
        }
    });

    // Повторная отправка кода
    document.getElementById('resendBtn').addEventListener('click', async () => {
        if (!canResend) return;
        
        errorMsg.innerText = '';
        
        try {
            const res = await fetch(`${API_URL}/register/resend-code`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: pendingRegistration.email })
            });
            const data = await res.json();
            
            if (data.success) {
                successMsg.innerText = '📧 Новый код отправлен';
                startTimer();
                codeInputs.forEach(i => i.value = '');
                codeInputs[0].focus();
            } else {
                errorMsg.innerText = '❌ ' + data.error;
            }
        } catch (err) {
            errorMsg.innerText = '❌ Ошибка соединения с сервером';
        }
    });

    // Назад к регистрации
    document.getElementById('backToRegisterBtn').addEventListener('click', () => {
        clearInterval(timerInterval);
        verifySection.classList.remove('active');
        registerSection.classList.add('active');
        errorMsg.innerText = '';
        successMsg.innerText = '';
    });
</script>
</body>
</html>
